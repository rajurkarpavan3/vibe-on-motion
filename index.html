<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIBE ON MOTION — Interactive Animation Workspace</title>
  <link rel="icon" type="image/png" href="/VOM_favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { orange: '#FE7143', dark: '#000000' } } } }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gifshot@0.4.5/dist/gifshot.min.js"></script>

  <style>
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', sans-serif; background-color: #FAF9F6; color: #000; height: 100vh; }
    .font-outfit { font-family: 'Outfit', sans-serif; }

    /* ── Keyframes ────────────────────────────────────────────────────────── */
    /* Fade group */
    @keyframes kf-fade         { 0%{opacity:0} 100%{opacity:1} }
    @keyframes kf-slide        { 0%{transform:translateX(var(--slide-x,-60px)) translateY(var(--slide-y,0px));opacity:var(--slide-fade,0)} 100%{transform:translate(0,0);opacity:1} }
    @keyframes kf-fade-slide   { 0%{transform:translateX(-40px);opacity:0} 100%{transform:translateX(0);opacity:1} }
    /* Move group (no fade) */
    @keyframes kf-move         { 0%{transform:translateX(var(--slide-x,-60px)) translateY(var(--slide-y,0px))} 100%{transform:translate(0,0)} }
    /* Scale group */
    @keyframes kf-grow         { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
    @keyframes kf-shrink       { 0%{transform:scale(1.6);opacity:0} 100%{transform:scale(1);opacity:1} }
    @keyframes kf-spin         { 0%{transform:rotate(var(--spin-deg,-180deg)) scale(0);opacity:0} 100%{transform:rotate(0deg) scale(1);opacity:1} }
    @keyframes kf-twist        { 0%{transform:scale(0) rotate(-270deg);opacity:0} 70%{transform:scale(1.1) rotate(8deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
    @keyframes kf-move-scale   { 0%{transform:translateY(40px) scale(0.8);opacity:0} 100%{transform:translate(0,0) scale(1);opacity:1} }
    @keyframes kf-scale-pop    { 0%{transform:scale(0);opacity:0} 55%{transform:scale(var(--pop-scale,1.25))} 100%{transform:scale(1);opacity:1} }
    /* Mask group */
    @keyframes kf-mask-reveal  { 0%{clip-path:inset(100% 0 0 0)} 100%{clip-path:inset(0% 0 0 0)} }
    @keyframes kf-mask-center  { 0%{clip-path:inset(50% 50%)} 100%{clip-path:inset(0%)} }
    @keyframes kf-mask-resize  { 0%{clip-path:inset(0 50%)} 100%{clip-path:inset(0 0%)} }
    @keyframes kf-mask-slide   { 0%{clip-path:inset(0 100% 0 0);transform:translateX(-30px)} 100%{clip-path:inset(0 0% 0 0);transform:translateX(0)} }
    @keyframes kf-mask-expand  { 0%{clip-path:circle(0% at 50% 50%)} 100%{clip-path:circle(100% at 50% 50%)} }
    /* Blur group */
    @keyframes kf-blur         { 0%{filter:blur(var(--blur-px,20px));opacity:0} 100%{filter:blur(0px);opacity:1} }
    @keyframes kf-blur-slide   { 0%{filter:blur(16px);transform:translateX(-30px);opacity:0} 100%{filter:blur(0px);transform:translateX(0);opacity:1} }
    @keyframes kf-blur-scale   { 0%{filter:blur(12px);transform:scale(0.85);opacity:0} 100%{filter:blur(0px);transform:scale(1);opacity:1} }
    @keyframes kf-soft-blur    { 0%{filter:blur(6px);opacity:0.4} 100%{filter:blur(0px);opacity:1} }
    /* Basic Motion (loops) */
    @keyframes kf-float        { 0%,100%{transform:translateY(0)} 50%{transform:translateY(var(--float-y,-24px))} }
    @keyframes kf-rotate       { 0%{transform:rotate(0deg)} 100%{transform:rotate(var(--rot-deg,360deg))} }
    @keyframes kf-bounce       { 0%,100%{transform:translateY(0);animation-timing-function:cubic-bezier(.8,0,1,1)} 50%{transform:translateY(var(--bounce-y,-36px));animation-timing-function:cubic-bezier(0,0,.2,1)} }
    @keyframes kf-pulse        { 0%,100%{transform:scale(1)} 50%{transform:scale(var(--pulse-scale,1.1))} }
    @keyframes kf-wave         { 0%,100%{transform:rotate(0deg) translateY(0)} 25%{transform:rotate(5deg) translateY(-6px)} 75%{transform:rotate(-5deg) translateY(6px)} }
    @keyframes kf-wiggle       { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(6deg)} 75%{transform:rotate(-6deg)} }
    /* UI Motion */
    @keyframes kf-hover-bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes kf-icon-nudge   { 0%,100%{transform:translate(0,0)} 50%{transform:translate(4px,-4px)} }
    @keyframes kf-notif-pop    { 0%{transform:scale(0)} 75%{transform:scale(1.15)} 100%{transform:scale(1)} }
    @keyframes kf-card-lift    { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-8px) scale(1.02)} }
    @keyframes kf-magnetic     { 0%,100%{transform:translate(0,0)} 50%{transform:translate(8px,-8px)} }
    /* Fade */
    @keyframes kf-fade         { 0%{opacity:0} 100%{opacity:1} }
    @keyframes kf-slide        { 0%{transform:translate(var(--slide-x,-40px),var(--slide-y,0));opacity:var(--slide-fade,0)} 100%{transform:translate(0,0);opacity:1} }
    
    /* Move (no fade) */
    @keyframes kf-move         { 0%{transform:translate(var(--slide-x,-40px),var(--slide-y,0))} 100%{transform:translate(0,0)} }
    @keyframes kf-prev-move-r  { 0%{transform:translateX(-10px)} 100%{transform:translateX(0)} }
    @keyframes kf-prev-move-l  { 0%{transform:translateX(10px)} 100%{transform:translateX(0)} }
    @keyframes kf-prev-move-t  { 0%{transform:translateY(10px)} 100%{transform:translateY(0)} }
    @keyframes kf-prev-move-b  { 0%{transform:translateY(-10px)} 100%{transform:translateY(0)} }

    /* Scale */
    @keyframes kf-grow         { 0%{transform:scale(var(--scale-from,0))} 100%{transform:scale(1)} }
    @keyframes kf-shrink       { 0%{transform:scale(var(--scale-from,2))} 100%{transform:scale(1)} }
    @keyframes kf-spin         { 0%{transform:rotate(0deg)} 100%{transform:rotate(var(--rot-deg,360deg))} }
    @keyframes kf-move-scale   { 0%{transform:translate(var(--slide-x,-40px),var(--slide-y,0)) scale(0)} 100%{transform:translate(0,0) scale(1)} }
    @keyframes kf-scale-pop    { 0%{transform:scale(0)} 70%{transform:scale(var(--pop-scale,1.25))} 100%{transform:scale(1)} }
    
    /* Mask */
    @keyframes kf-mask-top    { 0%{clip-path:inset(100% 0 0 0)} 100%{clip-path:inset(0)} }
    @keyframes kf-mask-bottom { 0%{clip-path:inset(0 0 100% 0)} 100%{clip-path:inset(0)} }
    @keyframes kf-mask-left   { 0%{clip-path:inset(0 0 0 100%)} 100%{clip-path:inset(0)} }
    @keyframes kf-mask-right  { 0%{clip-path:inset(0 100% 0 0)} 100%{clip-path:inset(0)} }
    @keyframes kf-mask-center  { 0%{clip-path:circle(0%)} 100%{clip-path:circle(100%)} }
    @keyframes kf-mask-resize  { 0%{clip-path:inset(20% 20% 20% 20%)} 100%{clip-path:inset(0)} }
    @keyframes kf-mask-slide   { 0%{clip-path:inset(0 100% 0 0);transform:translateX(-20px)} 100%{clip-path:inset(0);transform:translateX(0)} }
    @keyframes kf-mask-expand  { 0%{clip-path:ellipse(0% 0% at 50% 50%)} 100%{clip-path:ellipse(100% 100% at 50% 50%)} }

    /* Blur */
    @keyframes kf-blur         { 0%{filter:blur(var(--blur-px,20px))} 100%{filter:blur(0)} }
    @keyframes kf-blur-slide   { 0%{filter:blur(var(--blur-px,20px));transform:translateX(-40px)} 100%{filter:blur(0);transform:translateX(0)} }
    @keyframes kf-blur-scale   { 0%{filter:blur(var(--blur-px,20px));transform:scale(1.5)} 100%{filter:blur(0);transform:scale(1)} }
    @keyframes kf-soft-blur    { 0%{filter:blur(var(--blur-px,10px));opacity:0} 100%{filter:blur(0);opacity:1} }

    /* Basic Motion */
    @keyframes kf-float        { 0%,100%{transform:translateY(0)} 50%{transform:translateY(var(--float-y,-24px))} }
    @keyframes kf-rotate       { 0%{transform:rotate(0deg)} 100%{transform:rotate(var(--rot-deg,360deg))} }
    @keyframes kf-bounce       { 0%,100%{transform:translateY(0);animation-timing-function:cubic-bezier(.8,0,1,1)} 50%{transform:translateY(var(--bounce-y,-36px));animation-timing-function:cubic-bezier(0,0,.2,1)} }
    @keyframes kf-pulse        { 0%,100%{transform:scale(1)} 50%{transform:scale(var(--pulse-scale,1.1))} }
    @keyframes kf-wave         { 0%,100%{transform:rotate(0deg) translateY(0)} 25%{transform:rotate(5deg) translateY(-6px)} 75%{transform:rotate(-5deg) translateY(6px)} }
    @keyframes kf-wiggle       { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(6deg)} 75%{transform:rotate(-6deg)} }
    
    /* UI Motion */
    @keyframes kf-hover-bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes kf-notif-pop    { 0%{transform:scale(0)} 75%{transform:scale(1.15)} 100%{transform:scale(1)} }
    @keyframes kf-card-lift    { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-8px) scale(1.02)} }
    @keyframes kf-magnetic     { 0%,100%{transform:translate(0,0)} 50%{transform:translate(8px,-8px)} }
    
    /* Premium */
    @keyframes kf-luxury       { 0%{transform:translateY(20px) scale(.96);opacity:0;filter:blur(8px)} 100%{transform:translateY(0) scale(1);opacity:1;filter:blur(0)} }
    @keyframes kf-soft-hover   { 0%,100%{transform:scale(1) translateY(0)} 50%{transform:scale(1.02) translateY(-3px)} }
    @keyframes kf-glass-shimmer{ 0%,100%{opacity:.85;filter:brightness(1)} 50%{opacity:1;filter:brightness(1.12)} }
    
    /* Previews */
    @keyframes kf-prev-move-r { 0% {transform:translateX(-10px); opacity:0;} 100% {transform:translateX(0); opacity:1;} }
    @keyframes kf-prev-move-l { 0% {transform:translateX(10px); opacity:0;} 100% {transform:translateX(0); opacity:1;} }
    @keyframes kf-prev-move-t { 0% {transform:translateY(10px); opacity:0;} 100% {transform:translateY(0); opacity:1;} }
    @keyframes kf-prev-move-b { 0% {transform:translateY(-10px); opacity:0;} 100% {transform:translateY(0); opacity:1;} }
    /* Blur preset previews: use opacity instead of filter:blur for visibility */
    @keyframes kf-prev-blur { 0% {opacity:0.3;} 50% {opacity:1;} 100% {opacity:0.3;} }
    @keyframes kf-prev-blur-slide { 0% {opacity:0.3; transform:translateX(-5px);} 50% {opacity:1; transform:translateX(0);} 100% {opacity:0.3; transform:translateX(0);} }
    @keyframes kf-prev-blur-scale { 0% {opacity:0.3; transform:scale(0.85);} 50% {opacity:1; transform:scale(1);} 100% {opacity:0.3; transform:scale(1);} }
    @keyframes kf-prev-soft-blur { 0% {opacity:0.4;} 100% {opacity:1;} }
    
    /* Playful */
    @keyframes kf-elastic-pop  { 0%{transform:scale(0)} 50%{transform:scale(1.2)} 75%{transform:scale(.92)} 100%{transform:scale(1)} }
    @keyframes kf-jelly        { 0%,100%{transform:scale(1,1)} 30%{transform:scale(1.2,.8)} 50%{transform:scale(.9,1.15)} 70%{transform:scale(1.05,.95)} }
    @keyframes kf-bloom        { 0%{transform:scale(.4);filter:blur(10px);opacity:0} 100%{transform:scale(1);filter:blur(0);opacity:1} }
    @keyframes kf-bubble-rise  { 0%{transform:translateY(60px) scale(.5);opacity:0} 50%{transform:translateY(0) scale(1.05);opacity:1} 100%{transform:translateY(-60px) scale(.8);opacity:0} }
    @keyframes kf-orbit        { 0%{transform:rotate(0deg) translateX(var(--orbit-r,50px)) rotate(0deg)} 100%{transform:rotate(360deg) translateX(var(--orbit-r,50px)) rotate(-360deg)} }
    
    /* Tech */
    @keyframes kf-glitch       { 0%,100%{transform:translate(0);clip-path:inset(0);filter:none} 10%{transform:translate(-4px,2px);clip-path:inset(10% 0 60% 0);filter:drop-shadow(var(--rgb-split,-4px) 0 0 red) drop-shadow(calc(var(--rgb-split,-4px) * -1) 0 0 blue)} 20%{transform:translate(4px,-2px);clip-path:inset(80% 0 5% 0);filter:drop-shadow(calc(var(--rgb-split,-4px) * -1) 0 0 red) drop-shadow(var(--rgb-split,-4px) 0 0 blue)} 30%{transform:translate(-2px,2px);clip-path:inset(40% 0 40% 0);filter:none} 40%{transform:translate(2px,-2px);clip-path:inset(20% 0 20% 0);filter:drop-shadow(var(--rgb-split,-4px) 0 0 red)} 50%{transform:translate(0);clip-path:inset(0);filter:none} }
    @keyframes kf-hologram     { 0%,100%{opacity:1;filter:hue-rotate(0deg) brightness(1)} 33%{opacity:.7;filter:hue-rotate(90deg) brightness(1.3)} 66%{opacity:.9;filter:hue-rotate(180deg) brightness(.9)} }
    @keyframes kf-neon-glow    { 0%,100%{filter:drop-shadow(0 0 2px var(--glow-color,#FE7143))} 50%{filter:drop-shadow(0 0 12px var(--glow-color,#FE7143)) drop-shadow(0 0 24px var(--glow-color,#FE7143))} }
    @keyframes kf-pixel        { 0%{opacity:0;filter:contrast(2) brightness(1.3)} 100%{opacity:1;filter:contrast(1) brightness(1)} }
    @keyframes kf-rgb-split    { 0%,100%{filter:none} 50%{filter:drop-shadow(var(--rgb-split,-4px) 0 0 red) drop-shadow(calc(var(--rgb-split,-4px) * -1) 0 0 blue)} }
    @keyframes kf-x-ray        { 0%,100%{filter:invert(1) grayscale(1) opacity(var(--xray-op,0.8)) drop-shadow(0 0 4px rgba(255,255,255,0.5))} 50%{filter:invert(1) grayscale(1) opacity(calc(var(--xray-op,0.8) + 0.2)) drop-shadow(0 0 12px rgba(255,255,255,0.8))} }

    /* Gaming */
    @keyframes kf-loot-glow    { 0%,100%{filter:drop-shadow(0 0 4px gold) brightness(1)} 50%{filter:drop-shadow(0 0 20px gold) drop-shadow(0 0 40px gold) brightness(1.4)} }
    @keyframes kf-damage-shake { 0%,100%{transform:translate(0,0) rotate(0deg)} 15%{transform:translate(-6px,2px) rotate(-2deg)} 30%{transform:translate(6px,-2px) rotate(2deg)} 45%{transform:translate(-4px,1px) rotate(-1deg)} 60%{transform:translate(4px,-1px) rotate(1deg)} }
    @keyframes kf-energy       { 0%{transform:scale(.9);filter:brightness(1) saturate(1)} 50%{transform:scale(1.05);filter:brightness(1.5) saturate(2)} 100%{transform:scale(1);filter:brightness(1) saturate(1)} }

    /* Stroke / Trim Paths: dasharray set per-element, no auto-animation (JS drives it via stroke-dashoffset) */
    .layer-trim-paths svg path, .layer-trim-paths svg line, .layer-trim-paths svg polyline, .layer-trim-paths svg polygon, .layer-trim-paths svg rect, .layer-trim-paths svg circle, .layer-trim-paths svg ellipse {
      stroke-dasharray: var(--path-len, 2000) !important;
      fill: transparent !important;
      stroke-width: var(--stroke-w, 2px) !important;
      stroke-linecap: var(--stroke-cap, round) !important;
      stroke: var(--stroke-color, #FE7143) !important;
    }

    /* ── Utilities ──────────────────────────────────────────────────────────── */
    .bg-grid {
      background-size:20px 20px;
      background-image: linear-gradient(to right,rgba(0,0,0,.04) 1px,transparent 1px),
                        linear-gradient(to bottom,rgba(0,0,0,.04) 1px,transparent 1px);
    }
    .bg-checkerboard {
      background-image: linear-gradient(45deg, #e5e5e5 25%, transparent 25%), linear-gradient(-45deg, #e5e5e5 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e5e5 75%), linear-gradient(-45deg, transparent 75%, #e5e5e5 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }
    /* Range sliders */
    input[type="range"] {
      -webkit-appearance:none; appearance:none; width:100%; height:4px;
      background:linear-gradient(to right,#FE7143 var(--rp,0%),#E5E7EB var(--rp,0%));
      outline:none; border:none; border-radius:0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance:none; appearance:none; width:12px; height:12px;
      border-radius:50%; background:#000; cursor:pointer;
    }
    input[type="range"]::-moz-range-thumb { width:12px; height:12px; border-radius:50%; background:#000; border:none; }
    /* Scrollbars */
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:#FAF9F6; }
    ::-webkit-scrollbar-thumb { background:#000; }
    ::-webkit-scrollbar-thumb:hover { background:#FE7143; }
    /* Preset card hover preview */
    .preset-card:hover .card-dot { animation: var(--prev-anim, kf-float 1.2s ease-in-out infinite); }
    .preset-card.move-in-right:hover .card-dot { animation: kf-prev-move-r 1s infinite; }
    .preset-card.move-in-left:hover .card-dot { animation: kf-prev-move-l 1s infinite; }
    .preset-card.move-top:hover .card-dot { animation: kf-prev-move-t 1s infinite; }
    .preset-card.move-bottom:hover .card-dot { animation: kf-prev-move-b 1s infinite; }
    /* Blur preview: use opacity instead of blur so it's visible */
    .preset-card.blur:hover .card-dot { animation: kf-prev-blur 1.2s ease-in-out infinite; }
    .preset-card.blur-slide:hover .card-dot { animation: kf-prev-blur-slide 1.2s ease-in-out infinite; }
    .preset-card.blur-scale:hover .card-dot { animation: kf-prev-blur-scale 1.2s ease-in-out infinite; }
    .preset-card.soft-blur:hover .card-dot { animation: kf-prev-soft-blur 1.2s ease-in-out infinite; }
    /* Applied state */
    .preset-card.applied { border-color:#FE7143; background:#FFF8F5; }
    .preset-card.applied .card-label { color:#FE7143; }
    /* Layer selected row */
    .timeline-row.selected { background:#1c1917 !important; color:#fff; }
    /* Segment block transition */
    .seg-block { position:absolute; top:4px; bottom:4px; border-radius:0; border:1px solid rgba(0,0,0,.35); display:flex; align-items:center; overflow:hidden; padding:0 6px; cursor:grab; font-size:9px; font-weight:700; color:#fff; user-select:none; }
    .seg-resize-r, .seg-resize-l { position:absolute; top:0; bottom:0; width:6px; cursor:ew-resize; background:rgba(255,255,255,.35); z-index:20; }
    .seg-resize-r { right:0; }
    .seg-resize-l { left:0; }
  </style>
</head>
<body class="antialiased h-screen overflow-hidden flex flex-col bg-[#FAF9F6] text-black">

  <!-- ── Top Bar ───────────────────────────────────────────────────────────── -->
  <header class="grid grid-cols-12 border-b border-stone-800 bg-black sticky top-0 z-50" style="height:56px">
    <div class="col-span-3 flex items-center border-r border-stone-800 h-14">
      <div class="flex items-center justify-center px-5 border-r border-stone-800 h-14">
        <img src="vom_logo.png" alt="VOM" style="height:30px;width:auto;object-fit:contain;" onerror="this.style.display='none'">
      </div>
      <div class="flex items-center px-4 h-14">
        <span class="font-outfit font-black tracking-widest text-[10px] text-white uppercase whitespace-nowrap">VIBE ON MOTION</span>
      </div>
    </div>
    <div class="col-span-6 border-r border-stone-800 h-14"></div>
    <div class="col-span-3 flex items-stretch h-14">
      <input type="file" id="json-import" accept=".json" class="hidden">
      <button onclick="document.getElementById('json-import').click()" class="flex-1 flex items-center justify-center space-x-2 px-3 text-[10px] font-bold bg-black text-white hover:bg-brand-orange hover:text-black border-r border-stone-800 transition-colors" title="Load a saved project JSON">
        <i data-lucide="folder-open" class="w-3.5 h-3.5"></i><span class="hidden lg:inline">LOAD PROJECT</span>
      </button>
      <input type="file" id="file-upload" accept="image/*,.svg" class="hidden">
      <button onclick="newProject()" class="flex-1 flex items-center justify-center space-x-2 px-3 text-[10px] font-bold bg-brand-orange text-white hover:bg-orange-500 transition-colors" title="Start a new project">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i><span class="hidden lg:inline">NEW PROJECT</span>
      </button>
    </div>
  </header>

  <!-- ── Main workspace ────────────────────────────────────────────────────── -->
  <main class="flex-1 grid grid-cols-12 overflow-hidden" style="height:calc(100vh - 56px)">

    <!-- Left: Presets Library -->
    <section class="col-span-3 border-r border-black bg-white flex flex-col h-full overflow-hidden">
      <!-- Header -->
      <div class="flex items-center justify-between px-4 border-b border-black shrink-0 bg-white" style="height:40px">
        <span class="text-xs font-bold uppercase font-outfit tracking-wider">Presets</span>
        <span class="text-[10px] font-bold font-mono bg-brand-orange/10 text-brand-orange border border-brand-orange px-2 py-0.5" id="presets-count">— LIBRARY</span>
      </div>
      <!-- Scrollable preset grid -->
      <div class="flex-1 overflow-y-auto p-4 space-y-5" id="presets-container"></div>
    </section>

    <!-- Center: Canvas + Timeline -->
    <section class="col-span-6 flex flex-col bg-[#FAF9F6]">
      <!-- Canvas toolbar -->
      <div class="flex items-stretch border-b border-black bg-white shrink-0" style="height:40px">
        <div class="flex items-stretch border-r border-black" id="bg-toggles">
          <button onclick="setBg('grid')"        id="bg-grid"        class="px-5 text-[10px] font-bold border-r border-black transition-colors bg-white text-stone-500 hover:bg-stone-100">GRID</button>
          <button onclick="setBg('transparent')" id="bg-transparent" class="px-5 text-[10px] font-bold border-r border-black transition-colors bg-white text-stone-500 hover:bg-stone-100">TRANSPARENT</button>
          <button onclick="setBg('light')"       id="bg-light"       class="px-5 text-[10px] font-bold border-r border-black transition-colors bg-white text-stone-500 hover:bg-stone-100">LIGHT</button>

              <input type="number" id="comp-dur-val" value="5.0" step="0.5" min="0.5" max="60" onchange="updateCompDur(this.value)" class="w-12 text-black font-bold bg-transparent border-b border-stone-300 outline-none focus:border-brand-orange text-center p-0 h-4">

      <!-- populated by buildRightPanel() -->

  <!-- ── Scripts ────────────────────────────────────────────────────────────── -->
  <script>
  window.onerror = function(m,u,l){ document.title='ERR:'+m+' L:'+l; return false; };
  </script>
  <script>
  // ═══════════════════════════════════════════════════════════════════════════
  // DATA
  // ═══════════════════════════════════════════════════════════════════════════
  const PRESET_GROUPS = [
    { key:'fade',    title:'Fade',         presets:[
      { id:'fade',       name:'Fade',         kf:'kf-fade',       loop:false, easing:'ease-out', controls:['opacity'] },
      { id:'slide',      name:'Slide',        kf:'kf-slide',      loop:false, easing:'ease-out', controls:['slide-dir','slide-dist','slide-fade'] },
    ]},
    { key:'motion',  title:'Basic Motion', presets:[
      { id:'float',      name:'Float',        kf:'kf-float',      loop:true,  easing:'ease-in-out', controls:['float-dist'] },
      { id:'rotate',     name:'Rotate',       kf:'kf-rotate',     loop:true,  easing:'linear',      controls:['rot-deg'] },
      { id:'bounce',     name:'Bounce',       kf:'kf-bounce',     loop:true,  easing:'ease-in-out', controls:['bounce-h'] },
      { id:'pulse',      name:'Pulse',        kf:'kf-pulse',      loop:true,  easing:'ease-in-out', controls:['pulse-scale'] },
      { id:'wave',       name:'Wave',         kf:'kf-wave',       loop:true,  easing:'ease-in-out', controls:[] },
      { id:'wiggle',     name:'Wiggle',       kf:'kf-wiggle',     loop:true,  easing:'ease-in-out', controls:[] },
    ]},
    { key:'move',    title:'Move',         presets:[
      { id:'move-in-right', name:'Move In Right', kf:'kf-move', loop:false, easing:'ease-out', controls:['slide-dist'] },
      { id:'move-in-left',  name:'Move In Left',  kf:'kf-move', loop:false, easing:'ease-out', controls:['slide-dist'] },
      { id:'move-top',      name:'Move Top',      kf:'kf-move', loop:false, easing:'ease-out', controls:['slide-dist'] },
      { id:'move-bottom',   name:'Move Bottom',   kf:'kf-move', loop:false, easing:'ease-out', controls:['slide-dist'] },
    ]},
    { key:'stroke',  title:'Stroke',       presets:[
      { id:'trim-paths',   name:'Trim Paths',    kf:'kf-trim-paths',   loop:true, easing:'linear', controls:['stroke-width','stroke-cap','stroke-color'] },
    ]},
    { key:'scale',   title:'Scale',        presets:[
      { id:'grow',       name:'Grow',         kf:'kf-grow',       loop:false, easing:'cubic-bezier(0.34,1.56,0.64,1)', controls:['scale-range'] },
      { id:'shrink',     name:'Shrink',       kf:'kf-shrink',     loop:false, easing:'ease-out',  controls:['scale-range'] },
      { id:'spin',       name:'Spin',         kf:'kf-spin',       loop:false, easing:'ease-out',  controls:['rot-deg'] },
      { id:'move-scale', name:'Move & Scale', kf:'kf-move-scale', loop:false, easing:'ease-out',  controls:[] },
      { id:'scale-pop',  name:'Scale Pop',    kf:'kf-scale-pop',  loop:false, easing:'cubic-bezier(0.175,0.885,0.32,1.275)', controls:['pop-scale'] },
    ]},
    { key:'mask',    title:'Mask',         presets:[
      { id:'mask-reveal',name:'Mask Reveal',  kf:'kf-mask-top',   loop:false, easing:'ease-out', controls:['mask-dir'] },
      { id:'mask-center',name:'Mask Center',  kf:'kf-mask-center',loop:false, easing:'ease-out', controls:[] },
      { id:'mask-resize',name:'Mask Resize',  kf:'kf-mask-resize',loop:false, easing:'ease-out', controls:[] },
      { id:'mask-slide', name:'Mask & Slide', kf:'kf-mask-slide', loop:false, easing:'ease-out', controls:[] },
      { id:'mask-expand',name:'Mask Expand',  kf:'kf-mask-expand',loop:false, easing:'ease-out', controls:[] },
    ]},
    { key:'blur',    title:'Blur',         presets:[
      { id:'blur',       name:'Blur',         kf:'kf-blur',       loop:false, easing:'ease-out', controls:['blur-amt'] },
      { id:'blur-slide', name:'Blur & Slide', kf:'kf-blur-slide', loop:false, easing:'ease-out', controls:['blur-amt'] },
      { id:'blur-scale', name:'Blur & Scale', kf:'kf-blur-scale', loop:false, easing:'ease-out', controls:['blur-amt'] },
      { id:'soft-blur',  name:'Soft Blur',    kf:'kf-soft-blur',  loop:false, easing:'ease-out', controls:['blur-amt'] },
    ]},
    { key:'ui',      title:'UI Motion',    presets:[
      { id:'hover-bounce',name:'Hover Bounce',  kf:'kf-hover-bounce',loop:true, easing:'ease-in-out', controls:[] },
      { id:'notif-pop',   name:'Notification Pop',kf:'kf-notif-pop', loop:false,easing:'cubic-bezier(0.34,1.56,0.64,1)', controls:[] },
      { id:'card-lift',   name:'Card Lift',     kf:'kf-card-lift',   loop:true, easing:'ease-in-out', controls:[] },
      { id:'magnetic',    name:'Magnetic Hover',kf:'kf-magnetic',    loop:true, easing:'ease-in-out', controls:[] },
    ]},
    { key:'premium', title:'Premium',      presets:[
      { id:'luxury',      name:'Luxury Reveal', kf:'kf-luxury',      loop:false, easing:'cubic-bezier(0.16,1,0.3,1)', controls:[] },
      { id:'soft-hover',  name:'Soft Hover',    kf:'kf-soft-hover',  loop:true,  easing:'ease-in-out', controls:[] },
      { id:'glass',       name:'Glass Shimmer', kf:'kf-glass-shimmer',loop:true, easing:'ease-in-out', controls:[] },
    ]},
    { key:'playful', title:'Playful',      presets:[
      { id:'elastic-pop', name:'Elastic Pop',   kf:'kf-elastic-pop', loop:false, easing:'ease-out', controls:[] },
      { id:'jelly',       name:'Jelly Bounce',  kf:'kf-jelly',       loop:true,  easing:'ease-in-out', controls:[] },
      { id:'bloom',       name:'Bloom',         kf:'kf-bloom',       loop:false, easing:'ease-out',    controls:[] },
      { id:'bubble-rise', name:'Bubble Rise',   kf:'kf-bubble-rise', loop:true,  easing:'ease-in-out', controls:[] },
      { id:'orbit',       name:'Orbit',         kf:'kf-orbit',       loop:true,  easing:'linear',      controls:['orbit-r'] },
    ]},
    { key:'tech',    title:'Tech',         presets:[
      { id:'glitch',      name:'Glitch',        kf:'kf-glitch',      loop:true, easing:'steps(1,end)',  controls:['rgb-split'] },
      { id:'hologram',    name:'Hologram',      kf:'kf-hologram',    loop:true, easing:'linear',        controls:[] },
      { id:'neon-glow',   name:'Neon Glow',     kf:'kf-neon-glow',   loop:true, easing:'ease-in-out',   controls:['glow-color','glow-size'] },
      { id:'pixel',       name:'Pixel Dissolve',kf:'kf-pixel',       loop:false,easing:'ease-out',      controls:[] },
      { id:'rgb-split',   name:'RGB Split',     kf:'kf-rgb-split',   loop:true, easing:'ease-in-out',   controls:['rgb-split'] },
      { id:'x-ray',       name:'X-Ray',         kf:'kf-x-ray',       loop:true, easing:'ease-in-out',   controls:['xray-op'] },
    ]},
    { key:'gaming',  title:'Gaming',       presets:[
      { id:'loot-glow',   name:'Loot Glow',     kf:'kf-loot-glow',   loop:true,  easing:'ease-in-out', controls:['glow-color'] },
      { id:'damage-shake',name:'Damage Shake',  kf:'kf-damage-shake',loop:true,  easing:'ease-in-out', controls:[] },
      { id:'energy',      name:'Energy Charge', kf:'kf-energy',      loop:true,  easing:'ease-in-out', controls:[] },
    ]},
  ];

  function getPreset(id) {
    for (const g of PRESET_GROUPS) {
      const p = g.presets.find(p => p.id === id);
      if (p) return p;
    }
    return null;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════════════════════
  const PX_PER_SEC = 120;

  const S = {
    file: null,            // {type:'svg'|'png', data, name}
    layers: [],            // array of layer objects
    sel: null,             // selected layer id
    bg: 'grid',
    size: '400x400',
    scale: 1,
    playing: false,
    time: 0,
    compDur: 5.0,          // total composition duration
  };

  let raf = null, rafStart = null;

  function newLayerId() { return 'L' + Date.now(); }

  function mkLayer(presetId) {
    const p = getPreset(presetId);
    if (!p) return null;
    const params = {};
    // defaults
    if (p.controls.includes('opacity'))     params.opacity     = 1;
    if (p.controls.includes('blur-amt'))    params.blurAmt     = 20;
    if (p.controls.includes('scale-range')) params.scaleFrom   = 0;
    if (p.controls.includes('slide-dir'))   params.slideDir    = 'left';
    if (p.controls.includes('slide-dist'))  params.slideDist   = 60;
    if (p.controls.includes('slide-fade'))  params.slideFade   = 100;
    if (p.controls.includes('rot-deg'))     params.rotDeg      = 360;
    if (p.controls.includes('pop-scale'))   params.popScale    = 1.25;
    if (p.controls.includes('mask-dir'))    params.maskDir     = 'top';
    if (p.controls.includes('float-dist'))  params.floatDist   = 24;
    if (p.controls.includes('bounce-h'))    params.bounceH     = 36;
    if (p.controls.includes('pulse-scale')) params.pulseScale  = 1.1;
    if (p.controls.includes('orbit-r'))     params.orbitR      = 50;
    if (p.controls.includes('glitch-int'))  params.glitchInt   = 1;
    if (p.controls.includes('glow-color'))  params.glowColor   = '#FE7143';
    if (p.controls.includes('glow-size'))   params.glowSize    = 12;
    const layer = {
      id: newLayerId(),
      presetId,
      name: p.name,
      kf: p.kf,
      visible: true,
      direction: 'in',                     // 'in'|'out'
      duration: 1.5,
      delay: 0,
      easing: p.easing,
      params,
    };
    if (presetId === 'move-in-right') { layer.params.slideDir = 'right'; }
    if (presetId === 'move-in-left') { layer.params.slideDir = 'left'; }
    if (presetId === 'move-top') { layer.params.slideDir = 'top'; }
    if (presetId === 'move-bottom') { layer.params.slideDir = 'bottom'; }
    
    return layer;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // LEFT PANEL — preset grid
  // ═══════════════════════════════════════════════════════════════════════════
  function buildPresets() {
    const c = document.getElementById('presets-container');
    const countEl = document.getElementById('presets-count');
    c.innerHTML = '';

    const hasFile = !!S.file;

    let total = 0;
    PRESET_GROUPS.forEach(group => {
      total += group.presets.length;
      const sec = document.createElement('div');
      sec.className = 'space-y-2';
      sec.innerHTML = `<h3 class="text-[10px] font-bold uppercase tracking-widest text-stone-500 font-outfit">${group.title}</h3>`;
      const grid = document.createElement('div');
      grid.className = 'grid grid-cols-2 gap-2';

      group.presets.forEach(p => {
        const isApplied = S.layers.some(l => l.presetId === p.id);
        const div = document.createElement('div');
        div.className = `preset-card preset-id-${p.id} ${p.id} flex flex-col justify-between border border-black p-2 h-24 cursor-pointer select-none transition-colors ${isApplied ? 'applied' : 'bg-white hover:bg-stone-50'} ${!hasFile ? 'opacity-40 cursor-not-allowed' : ''}`;
        // For blur presets, don't set --prev-anim so CSS selectors like .preset-card.blur:hover apply instead
        if (!['blur', 'blur-slide', 'blur-scale', 'soft-blur'].includes(p.id)) {
          div.style.setProperty('--prev-anim', `${p.kf} 1.4s ease-in-out infinite`);
        }

        if (hasFile) {
          if (!isApplied) {
            div.onclick = () => applyPreset(p.id);
          } else {
            div.onclick = () => {
              const layer = S.layers.find(l => l.presetId === p.id);
              if (layer) { S.sel = layer.id; refreshAll(); }
            };
          }
        }

        div.innerHTML = `
          <div class="flex items-center justify-between">
            <span class="card-label text-[10px] font-bold uppercase truncate text-stone-700 ${isApplied ? 'text-brand-orange' : ''}">${p.name}</span>
            ${isApplied ? `<button onclick="event.stopPropagation(); removeLayerByPreset('${p.id}')" class="text-brand-orange hover:text-orange-700 p-1 -mr-1 -mt-1"><i data-lucide="x" class="w-3 h-3"></i></button>` : ''}
          </div>
          <div class="flex-1 mt-1 border border-stone-200 overflow-hidden flex items-center justify-center ${isApplied ? 'bg-orange-50 border-orange-200' : 'bg-white'}">
            <div class="card-dot w-4 h-4 ${isApplied ? 'bg-brand-orange' : 'bg-black'} border border-black"></div>
          </div>`;
        grid.appendChild(div);
      });

      sec.appendChild(grid);
      c.appendChild(sec);
    });

    if (countEl) countEl.textContent = `${total} LIBRARY`;
    lucide.createIcons();
  }

  function removeLayerByPreset(presetId) {
    const layer = S.layers.find(l => l.presetId === presetId);
    if (layer) removeLayer(layer.id);
  }

  function applyPreset(presetId) {
    const existing = S.layers.find(l => l.presetId === presetId);
    if (existing) {
      S.sel = existing.id;
      refreshAll();
      return;
    }
    const layer = mkLayer(presetId);
    if (!layer) return;
    S.layers.push(layer);
    S.sel = layer.id;
    refreshAll();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // RENDER GRAPHIC — uses nested wrapper divs so each layer's animation is
  //   on its own element, allowing transforms from different presets to stack.
  // ═══════════════════════════════════════════════════════════════════════════
  function renderGraphic() {
    const w = document.getElementById('graphic-wrapper');
    if (!w) return;

    if (!S.file) {
      w.style.animation = 'none';
      w.style.transform = '';
      w.innerHTML = `
        <div onclick="document.getElementById('file-upload').click()" class="cursor-pointer flex flex-col items-center justify-center p-6 space-y-3 group border-2 border-dashed border-stone-300 hover:border-brand-orange transition-colors bg-white w-full h-full shadow-sm">
          <div class="w-10 h-10 rounded-full bg-stone-50 group-hover:bg-orange-50 flex items-center justify-center transition-colors">
            <i data-lucide="upload" class="w-5 h-5 text-stone-400 group-hover:text-brand-orange transition-colors"></i>
          </div>
          <p class="text-[10px] font-bold uppercase tracking-widest text-stone-400 group-hover:text-brand-orange transition-colors text-center">Upload File<br><span class="text-[9px] font-normal tracking-normal text-stone-400">SVG, PNG, JPG</span></p>
        </div>
      `;
      lucide.createIcons();
      return;
    }

    // Build asset HTML
    let assetHTML = '';
    if (S.file.type === 'svg') {
      let d = S.file.data;
      const xi = d.indexOf('<svg');
      if (xi > -1) d = d.substring(xi);
      assetHTML = d;
    } else {
      assetHTML = `<img src="${S.file.data}" alt="Graphic" style="width:100%;height:100%;object-fit:contain;display:block;">`;
    }

    // Build nested wrappers: one per visible layer, innermost contains the asset
    const vis = S.layers.filter(l => l.visible);
    if (!vis.length) {
      w.innerHTML = assetHTML;
      w.style.animation = 'none';
      w.style.transform = `scale(${S.scale})`;
      const svgEl = w.querySelector('svg');
      if (svgEl) svgEl.style.cssText = 'width:100%;height:100%;max-width:100%;max-height:100%;display:block;overflow:visible;';
      return;
    }

    // Build from inside out: innermost = asset, each layer wraps it
    let html = assetHTML;
    for (let i = vis.length - 1; i >= 0; i--) {
      const l = vis[i];
      let kf     = l.kf;
      if (l.presetId === 'mask-reveal' && l.params && l.params.maskDir) {
        kf = 'kf-mask-' + l.params.maskDir;
      }
      const iters  = '1';
      const dir    = l.direction === 'out' ? 'reverse' : 'normal';
      const fill   = 'forwards';
      const ps     = S.playing ? 'running' : 'paused';
      
      let animStr = 'none';
      if (S.time < l.delay) {
        if (S.playing) {
          const delayVal = l.delay - S.time;
          animStr = `${kf} ${l.duration}s ${l.easing} ${delayVal.toFixed(3)}s ${iters} ${dir} ${fill}`;
        } else {
          animStr = 'none';
        }
      } else if (S.time <= l.delay + l.duration) {
        const elapsed = S.time - l.delay;
        animStr = `${kf} ${l.duration}s ${l.easing} -${elapsed.toFixed(3)}s ${iters} ${dir} ${fill}`;
      } else {
        animStr = `${kf} ${l.duration}s ${l.easing} -${l.duration.toFixed(3)}s ${iters} ${dir} ${fill}`;
      }
      
      const stScale = (l.params && l.params.layerScale !== undefined) ? l.params.layerScale : 1;
      const stRot   = (l.params && l.params.layerRot !== undefined) ? l.params.layerRot : 0;
      
      // For trim-paths, animations run directly on SVG elements, not on the layer div.
      // So disable the div animation to avoid conflicts.
      if (l.presetId === 'trim-paths') {
        animStr = 'none';
      }
      
      const extraClass = l.presetId === 'trim-paths' ? 'layer-trim-paths' : '';
      let defsInject = '';
      if (l.presetId === 'trim-paths' && (l.params?.['stroke-color-mode'] || 'solid') === 'gradient') {
         const c1 = l.params?.['stroke-c1'] || '#FE7143';
         const c2 = l.params?.['stroke-c2'] || '#FFB020';
         defsInject = `<svg class="gradient-defs-svg" width="0" height="0" style="position:absolute;pointer-events:none;"><defs><linearGradient id="grad-${l.id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs></svg>`;
      }
      const inner = `<div class="${extraClass}" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;animation:${animStr};animation-play-state:${ps};">${defsInject}${html}</div>`;
      html = `<div data-layer-id="${l.id}" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;transform:scale(${stScale}) rotate(${stRot}deg);">${inner}</div>`;
    }
    w.innerHTML = html;
    w.style.animation = 'none';

    // Fix SVG sizing
    const svgEl = w.querySelector('svg:not(.gradient-defs-svg)');
    if (svgEl) svgEl.style.cssText = 'width:100%;height:100%;max-width:100%;max-height:100%;display:block;overflow:visible;';

    // Apply CSS vars to each layer wrapper
    vis.forEach(l => {
      const el = w.querySelector(`[data-layer-id="${l.id}"]`);
      if (el) applyCSSVars(el, l);
    });
  }

  function applyCSSVars(el, l) {
    const p = l.params || {};
    const set = (k,v) => el.style.setProperty(k, v);
    if (p.blurAmt    !== undefined) set('--blur-px',    `${p.blurAmt}px`);
    if (p.rotDeg     !== undefined) { set('--rot-deg', `${p.rotDeg}deg`); set('--spin-deg', `-${p.rotDeg}deg`); }
    if (p.popScale   !== undefined) set('--pop-scale',  p.popScale);
    if (p.floatDist  !== undefined) set('--float-y',    `-${p.floatDist}px`);
    if (p.bounceH    !== undefined) set('--bounce-y',   `-${p.bounceH}px`);
    if (p.pulseScale !== undefined) set('--pulse-scale',p.pulseScale);
    if (p.orbitR     !== undefined) set('--orbit-r',    `${p.orbitR}px`);
    if (p.glowColor  !== undefined) set('--glow-color', p.glowColor);
    if (p.slideFade  !== undefined) set('--slide-fade', 1 - (p.slideFade/100));
    if (p.slideDist  !== undefined) {
      const dir = p.slideDir || 'left';
      const x = (dir==='left'?-1:dir==='right'?1:0) * p.slideDist;
      const y = (dir==='top'?-1:dir==='bottom'?1:0) * p.slideDist;
      set('--slide-x', `${x}px`);
      set('--slide-y', `${y}px`);
    }
    if (p.rgbSplit   !== undefined) set('--rgb-split',  `${p.rgbSplit}px`);
    if (p.xrayOp     !== undefined) set('--xray-op',    p.xrayOp);
    if (l.presetId === 'trim-paths') {
      set('--stroke-w', `${p['stroke-width'] ?? 2}px`);
      set('--stroke-cap', p['stroke-cap'] ?? 'round');
      if ((p['stroke-color-mode'] || 'solid') === 'gradient') {
        set('--stroke-color', `url(#grad-${l.id})`);
      } else {
        set('--stroke-color', p['stroke-c1'] || '#FE7143');
      }
      // Measure each stroke's real path length and drive stroke-dashoffset based on timeline progress.
      // This respects user scrubbing (S.time) instead of auto-playing the keyframe.
      try {
        const wrap = document.getElementById('graphic-wrapper');
        if (wrap) {
          const els = wrap.querySelectorAll('svg path, svg line, svg polyline, svg polygon, svg rect, svg circle, svg ellipse');
          els.forEach(el => {
            let len = 0;
            try { if (typeof el.getTotalLength === 'function') len = el.getTotalLength(); } catch(_) { len = 0; }
            // Fallbacks for shapes where getTotalLength may report 0 or error
            if (!len || !isFinite(len)) {
              const tag = el.tagName.toLowerCase();
              if (tag === 'rect') { const w=+el.getAttribute('width')||0, h=+el.getAttribute('height')||0; len = 2*(w+h); }
              else if (tag === 'circle') { const r=+el.getAttribute('r')||0; len = 2*Math.PI*r; }
              else if (tag === 'ellipse') { const rx=+el.getAttribute('rx')||0, ry=+el.getAttribute('ry')||0; len = Math.PI*(3*(rx+ry)-Math.sqrt((3*rx+ry)*(rx+3*ry))); }
            }
            if (!len || !isFinite(len)) len = 1000;
            len = Math.ceil(len);
            el.style.setProperty('--path-len', len);
            
            // Calculate progress: where are we in this layer's time window?
            const elapsed = S.time - l.delay;
            let prog = 0; // 0 = start, 1 = end
            if (elapsed >= 0 && elapsed <= l.duration) {
              prog = elapsed / l.duration;
            } else if (elapsed > l.duration) {
              prog = 1; // past the end, hold at fully drawn
            }
            // If direction is 'out', reverse the progress
            if (l.direction === 'out') prog = 1 - prog;
            // dashoffset = full length at start, 0 at end
            const offset = len * (1 - prog);
            el.style.strokeDashoffset = offset;
          });
        }
      } catch(e) { /* ignore */ }
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TIMELINE
  // ═══════════════════════════════════════════════════════════════════════════
  function updateCompDur(val) {
    let v = parseFloat(val);
    if(isNaN(v)) v=5;
    v = Math.max(0.5, Math.min(60, v));
    S.compDur = v;
    document.getElementById('comp-dur-val').value = v.toFixed(1);
    buildTimeline();
  }

  function getTotalDur() {
    return S.compDur || 5;
  }

  function buildTimeline() {
    const headers = document.getElementById('tl-headers');
    const ruler   = document.getElementById('tl-ruler');
    const rows    = document.getElementById('tl-rows');
    if (!headers || !ruler || !rows) return;

    const total = getTotalDur();
    const W = total * PX_PER_SEC;

    // Ruler
    ruler.style.width = W + 'px';
    let rHTML = '';
    for (let t = 0; t <= total; t += 0.5) {
      const x = t * PX_PER_SEC;
      const major = Number.isInteger(t);
      rHTML += `<div class="absolute flex flex-col items-center" style="left:${x}px;top:0">
        <div class="bg-black" style="width:1px;height:${major?14:7}px"></div>
        ${major ? `<span style="font-size:8px;font-family:monospace;color:#78716c;margin-top:1px">${t.toFixed(1)}s</span>` : ''}
      </div>`;
    }
    ruler.innerHTML = rHTML;

    headers.innerHTML = '';
    rows.innerHTML = '';

    const COLORS = ['#FE7143','#7C3AED','#0EA5E9','#10B981','#F59E0B','#EC4899','#6366F1'];

    if (!S.layers.length) {
      headers.innerHTML = `<div class="flex-1 flex items-center justify-center text-[10px] text-stone-400 px-3">No layers</div>`;
      rows.innerHTML = `<div style="width:${W}px;height:40px" class="flex items-center justify-center text-[10px] text-stone-400">Apply a preset to start</div>`;
      return;
    }

    S.layers.forEach((layer, i) => {
      const color = COLORS[i % COLORS.length];
      const isSel = layer.id === S.sel;
      const fn = S.file ? S.file.name.replace(/\.[^.]+$/, '') : 'Object';

      // Header
      const h = document.createElement('div');
      h.className = `flex items-center px-2 space-x-1.5 cursor-pointer select-none h-10 ${isSel ? 'bg-stone-900 text-white' : 'bg-stone-50 text-black hover:bg-stone-100'} timeline-row ${isSel ? 'selected' : ''}`;
      h.style.borderLeft = `3px solid ${color}`;
      h.onclick = () => { S.sel = layer.id; buildTimeline(); buildRightPanel(); };
      
      // Make row draggable
      h.draggable = true;
      h.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', i);
        h.style.opacity = '0.4';
      });
      h.addEventListener('dragover', e => {
        e.preventDefault();
        h.classList.add('bg-stone-800');
      });
      h.addEventListener('dragleave', () => {
        h.classList.remove('bg-stone-800');
      });
      h.addEventListener('drop', e => {
        e.preventDefault();
        h.classList.remove('bg-stone-800');
        const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
        if (fromIdx !== i && !isNaN(fromIdx)) {
          const temp = S.layers[fromIdx];
          S.layers.splice(fromIdx, 1);
          S.layers.splice(i, 0, temp);
          refreshAll();
        }
      });
      h.addEventListener('dragend', () => {
        h.style.opacity = '1';
      });

      h.innerHTML = `
        <div class="flex items-center shrink-0 mr-1 cursor-grab" title="Drag to reorder">
          <i data-lucide="grip-vertical" class="w-3.5 h-3.5 text-stone-400"></i>
        </div>
        <button onclick="event.stopPropagation();toggleVis('${layer.id}')" class="shrink-0 ${layer.visible?'':'opacity-40'}">
          <i data-lucide="${layer.visible?'eye':'eye-off'}" class="w-3 h-3"></i>
        </button>
        <span class="text-[9px] font-bold truncate flex-1">${fn} — ${layer.name}</span>
        <button onclick="event.stopPropagation();removeLayer('${layer.id}')" class="shrink-0 text-stone-400 hover:text-red-500 transition-colors">
          <i data-lucide="x" class="w-3 h-3"></i>
        </button>`;
      headers.appendChild(h);

      // Track row
      const r = document.createElement('div');
      r.className = `relative h-10 cursor-pointer ${isSel ? 'bg-stone-800' : 'bg-stone-100 hover:bg-stone-200'}`;
      r.style.width = W + 'px';
      r.onclick = () => { S.sel = layer.id; buildTimeline(); buildRightPanel(); };

      // Segment block
      const snap = (v) => Math.round(v * 10) / 10;
      const bLeft = layer.delay * PX_PER_SEC;
      const bW    = Math.max(layer.duration * PX_PER_SEC, 10);
      const seg   = document.createElement('div');
      seg.className = 'seg-block';
      seg.style.cssText = `left:${bLeft}px;width:${bW}px;background:${color}`;
      seg.innerHTML = `<div class="seg-resize-l"></div><span class="truncate z-10 relative pointer-events-none px-1">${layer.name}</span><div class="seg-resize-r"></div>`;

      // Drag to move delay
      let dx0=0, dl0=0;
      seg.addEventListener('mousedown', ev => {
        if (ev.target.classList.contains('seg-resize-l') || ev.target.classList.contains('seg-resize-r')) return;
        ev.preventDefault(); ev.stopPropagation();
        dx0=ev.clientX; dl0=layer.delay;
        const mm = e => { layer.delay=snap(Math.max(0,dl0+(e.clientX-dx0)/PX_PER_SEC)); seg.style.left=(layer.delay*PX_PER_SEC)+'px'; syncRPDelayDisplay(); renderGraphic(); };
        const mu = () => { window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); buildTimeline(); };
        window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
      });

      // Resize left edge
      const lh = seg.querySelector('.seg-resize-l');
      let lx0=0, ldl0=0, ldr0=0;
      lh.addEventListener('mousedown', ev => {
        ev.preventDefault(); ev.stopPropagation();
        lx0=ev.clientX; ldl0=layer.delay; ldr0=layer.duration;
        const mm = e => { 
          let newD = snap(Math.max(0, ldl0+(e.clientX-lx0)/PX_PER_SEC));
          if (newD > ldl0 + ldr0 - 0.1) newD = ldl0 + ldr0 - 0.1;
          layer.delay = newD;
          layer.duration = snap(ldl0 + ldr0 - newD);
          seg.style.left=(layer.delay*PX_PER_SEC)+'px'; 
          seg.style.width=(layer.duration*PX_PER_SEC)+'px';
          syncRPDelayDisplay(); syncRPDurDisplay(); renderGraphic();
        };
        const mu = () => { window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); buildTimeline(); };
        window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
      });

      // Resize right edge
      const rh = seg.querySelector('.seg-resize-r');
      let rx0=0, rd0=0;
      rh.addEventListener('mousedown', ev => {
        ev.preventDefault(); ev.stopPropagation();
        rx0=ev.clientX; rd0=layer.duration;
        const mm = e => { layer.duration=snap(Math.max(0.1,rd0+(e.clientX-rx0)/PX_PER_SEC)); seg.style.width=(layer.duration*PX_PER_SEC)+'px'; syncRPDurDisplay(); renderGraphic(); };
        const mu = () => { window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); buildTimeline(); };
        window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
      });

      r.appendChild(seg);
      rows.appendChild(r);
    });

    lucide.createIcons();
    updatePlayhead();
  }

  function updatePlayhead() {
    const ph = document.getElementById('tl-playhead');
    if (ph) ph.style.left = (S.time * PX_PER_SEC) + 'px';
    const tl = document.getElementById('time-lbl'); if (tl) tl.textContent = S.time.toFixed(2) + 's';
  }

  function syncRPDelayDisplay() {
    const el = document.getElementById('rp-delay-val');
    const sl = getSelLayer();
    if (el && sl) el.value = sl.delay.toFixed(2);
  }
  function syncRPDurDisplay() {
    const el = document.getElementById('rp-dur-val');
    const sl = getSelLayer();
    if (el && sl) el.value = sl.duration.toFixed(2);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // RIGHT PANEL
  // ═══════════════════════════════════════════════════════════════════════════
  function buildRightPanel() {
    const rp = document.getElementById('right-panel');
    if (!rp) return;
    const layer = getSelLayer();

    if (!layer) {
      rp.innerHTML = `
        <div class="flex items-center justify-between px-4 border-b border-black bg-white shrink-0" style="height:40px">
          <span class="text-xs font-bold uppercase font-outfit tracking-wider text-stone-500">Controls</span>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center p-8 space-y-3 text-center">
          <i data-lucide="layers" class="w-6 h-6 text-stone-300"></i>
          <p class="text-xs text-stone-400">Select or apply a preset to edit it</p>
        </div>
        ${exportRowHTML()}`;
      lucide.createIcons();
      return;
    }

    const fn = S.file ? S.file.name : 'Object';
    const preset = getPreset(layer.presetId);

    rp.innerHTML = `
      <div class="flex flex-col border-b border-black shrink-0 bg-white px-4 py-3 space-y-0.5 relative">
        <span class="text-[10px] font-bold uppercase tracking-widest text-brand-orange font-outfit">Editing: ${layer.name}</span>
        <span class="text-[9px] text-stone-400">Applied to: ${fn}</span>
        <button onclick="removeLayer('${layer.id}')" class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-400 hover:text-red-500 transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <div class="flex-1 overflow-y-auto p-4 space-y-5">

        <!-- Easing -->
        <div class="space-y-1.5 relative" id="easing-wrap">
          <label class="text-[10px] font-bold uppercase tracking-wider text-stone-500">Easing</label>
          <button onclick="toggleEasingDrop(event)" class="w-full text-left text-xs font-semibold px-3 py-2 bg-white border border-black flex items-center justify-between">
            <span id="easing-lbl">${easingLabel(layer.easing)}</span>
            <i data-lucide="chevron-down" class="w-4 h-4"></i>
          </button>
          <div id="easing-drop" class="absolute left-0 top-full w-full bg-white border border-black shadow-[4px_4px_0_rgba(0,0,0,1)] z-50 hidden divide-y divide-black overflow-y-auto" style="max-height:200px">
            ${EASINGS.map(([v,l], idx) => `<button onclick="pickEasingByIdx(${idx},event)" class="w-full text-left px-4 py-2.5 text-[10px] font-bold hover:bg-brand-orange hover:text-white transition font-outfit uppercase">${l}</button>`).join('')}
          </div>
        </div>

        <!-- Direction -->
        <div class="space-y-1.5">
          <label class="text-[10px] font-bold uppercase tracking-wider text-stone-500">Direction</label>
          <div class="flex border border-black">
            ${['in','out'].map((d,i) => `
              <button onclick="setLP('direction','${d}')" class="flex-1 py-1.5 text-[10px] font-bold transition-colors ${layer.direction===d?'bg-black text-white':'bg-white text-stone-500 hover:bg-stone-100'} ${i===0?'border-r border-black':''}">${d==='in'?'In':'Out'}</button>`).join('')}
          </div>
        </div>

        <!-- Timing -->
        <div class="space-y-3">
          <label class="text-[10px] font-bold uppercase tracking-wider text-stone-500">Timing</label>

          <!-- Duration -->
          <div class="space-y-1">
            <div class="flex justify-between items-center">
              <span class="text-xs text-stone-600">Duration (s)</span>
              <input id="rp-duration-val" type="text" value="${layer.duration.toFixed(2)}" onchange="setLPNum('duration',this.value,0.1,30)" class="w-14 text-center font-mono text-[11px] border border-black focus:outline-none py-0.5">
            </div>
            <input id="rp-duration-slider" type="range" min="0.1" max="10" step="0.05" value="${layer.duration}" oninput="setLPSlider('duration',this.value,'rp-duration-val')" class="w-full" style="--rp:${pct(layer.duration,0.1,10)}%">
          </div>
        </div>

        <!-- Global Transform -->
        <div class="border-t border-black pt-4 space-y-3">
          <label class="text-[10px] font-bold uppercase tracking-wider text-stone-500">Global Transform</label>
          <div class="space-y-1">
            <div class="flex justify-between items-center">
              <span class="text-xs text-stone-600">Scale</span>
              <input id="pc-layerScale-val" type="text" value="${layer.params?.layerScale ?? 1}" onchange="setPP('layerScale',this.value,-5,5)" class="w-14 text-center font-mono text-[11px] border border-black focus:outline-none py-0.5">
            </div>
            <input id="pc-layerScale-sl" type="range" min="-5" max="5" step="0.05" value="${layer.params?.layerScale ?? 1}" oninput="setPPSlider('layerScale',this.value,'pc-layerScale-val')" class="w-full" style="--rp:${pct(layer.params?.layerScale ?? 1,-5,5)}%">
          </div>
          <div class="space-y-1 mt-2">
            <div class="flex justify-between items-center">
              <span class="text-xs text-stone-600">Rotate (°)</span>
              <input id="pc-layerRot-val" type="text" value="${layer.params?.layerRot ?? 0}" onchange="setPP('layerRot',this.value,-360,360)" class="w-14 text-center font-mono text-[11px] border border-black focus:outline-none py-0.5">
            </div>
            <input id="pc-layerRot-sl" type="range" min="-360" max="360" step="1" value="${layer.params?.layerRot ?? 0}" oninput="setPPSlider('layerRot',this.value,'pc-layerRot-val')" class="w-full" style="--rp:${pct(layer.params?.layerRot ?? 0,-360,360)}%">
          </div>
        </div>

        ${presetSpecificHTML(layer)}

        <!-- Actions -->
        <div class="border-t border-black pt-4 space-y-2">
          <label class="text-[10px] font-bold uppercase tracking-wider text-stone-500">Actions</label>
          <div class="grid grid-cols-2 gap-2">
            <button onclick="duplicateLayer('${layer.id}')" class="py-2 text-[10px] font-bold bg-white hover:bg-stone-100 border border-black uppercase tracking-wider transition flex items-center justify-center space-x-1.5">
              <i data-lucide="copy" class="w-3 h-3"></i><span>Duplicate</span>
            </button>
            <button onclick="resetLayer('${layer.id}')" class="py-2 text-[10px] font-bold bg-white hover:bg-stone-100 border border-black uppercase tracking-wider transition flex items-center justify-center space-x-1.5">
              <i data-lucide="rotate-ccw" class="w-3 h-3"></i><span>Reset</span>
            </button>
          </div>
        </div>

      </div>

      ${exportRowHTML()}`;

    lucide.createIcons();
  }

  function presetSpecificHTML(layer) {
    const p = layer.params || {};
    const preset = getPreset(layer.presetId);
    if (!preset || !preset.controls.length) return '';

    let html = `<div class="border-t border-black pt-4 space-y-3">
      <label class="text-[10px] font-bold uppercase tracking-wider text-stone-500">Preset Controls</label>`;

    const sRow = (key, label, min, max, step, valKey) => {
      const v = p[valKey] ?? min;
      return `<div class="space-y-1">
        <div class="flex justify-between items-center">
          <span class="text-xs text-stone-600">${label}</span>
          <input id="pc-${key}-val" type="text" value="${v}" onchange="setPP('${valKey}',this.value,${min},${max})" class="w-14 text-center font-mono text-[11px] border border-black focus:outline-none py-0.5">
        </div>
        <input id="pc-${key}-sl" type="range" min="${min}" max="${max}" step="${step}" value="${v}" oninput="setPPSlider('${valKey}',this.value,'pc-${key}-val')" class="w-full" style="--rp:${pct(v,min,max)}%">
      </div>`;
    };

    if (preset.controls.includes('opacity'))     html += sRow('opacity','Opacity',0,1,0.05,'opacity');
    if (preset.controls.includes('blur-amt'))    html += sRow('blur','Blur (px)',0,100,1,'blurAmt');
    if (preset.controls.includes('scale-range')) html += sRow('scale-from','Scale from',-2,5,0.05,'scaleFrom');
    if (preset.controls.includes('slide-dist'))  html += sRow('slide-dist','Distance (px)',-500,500,1,'slideDist');
    if (preset.controls.includes('slide-fade'))  html += sRow('slide-fade','Fade Intensity %',0,100,1,'slideFade');
    if (preset.controls.includes('slide-dir')) {
      const dirs = ['left','right','top','bottom'];
      html += `<div class="space-y-1.5">
        <span class="text-xs text-stone-600">Slide direction</span>
        <div class="grid grid-cols-2 gap-1">
          ${dirs.map(d => `<button onclick="setPP('slideDir','${d}',null,null)" class="py-1.5 text-[10px] font-bold border border-black transition-colors ${p.slideDir===d?'bg-black text-white':'bg-white hover:bg-stone-100'} uppercase">${d}</button>`).join('')}
        </div>
      </div>`;
    }
    if (preset.controls.includes('stroke-width')) html += sRow('stroke-width','Thickness (px)',0,50,0.5,'stroke-width');
    if (preset.controls.includes('stroke-cap')) {
      const caps = ['round','square','butt'];
      html += `<div class="space-y-1.5">
        <span class="text-xs text-stone-600">Stroke End</span>
        <div class="grid grid-cols-3 gap-0 border border-black">
          ${caps.map((c,i) => `<button onclick="setPP('stroke-cap','${c}',null,null)" class="py-1 text-[10px] font-bold transition-colors ${(p['stroke-cap']===c || (!p['stroke-cap'] && c==='round')) ? 'bg-black text-white' : 'bg-white hover:bg-stone-100'} uppercase ${i<2?'border-r border-black':''}">${c}</button>`).join('')}
        </div>
      </div>`;
    }
    if (preset.controls.includes('stroke-color')) {
      const mode = p['stroke-color-mode'] || 'solid';
      const c1 = p['stroke-c1'] || '#FE7143';
      const c2 = p['stroke-c2'] || '#FFB020';
      html += `<div class="space-y-1.5 border border-stone-200 p-2 bg-white">
        <div class="flex justify-between items-center mb-2 relative" id="stroke-mode-wrap">
          <span class="text-xs text-stone-600 font-bold">Stroke Color</span>
          <div class="relative">
            <button onclick="toggleStrokeModeDrop(event)" class="text-[10px] font-bold px-2 py-1 bg-white border border-black flex items-center justify-between space-x-1.5 w-24">
              <span>${mode === 'gradient' ? 'Gradient' : 'Solid'}</span>
              <i data-lucide="chevron-down" class="w-3 h-3 text-stone-600"></i>
            </button>
            <div id="stroke-mode-drop" class="absolute right-0 top-full mt-1 w-24 bg-white border border-black shadow-[2px_2px_0_rgba(0,0,0,1)] z-50 hidden divide-y divide-black" onclick="event.stopPropagation()">
              <button onclick="pickStrokeMode('solid', event)" class="w-full text-left px-3 py-2 text-[9px] font-bold hover:bg-brand-orange hover:text-white transition uppercase">Solid</button>
              <button onclick="pickStrokeMode('gradient', event)" class="w-full text-left px-3 py-2 text-[9px] font-bold hover:bg-brand-orange hover:text-white transition uppercase">Gradient</button>
            </div>
          </div>
        </div>
        <div class="flex space-x-2">
          <input type="color" value="${c1}" onchange="setPPDirect('stroke-c1',this.value)" class="flex-1 h-8 border border-black cursor-pointer">
          ${mode==='gradient' ? `<input type="color" value="${c2}" onchange="setPPDirect('stroke-c2',this.value)" class="flex-1 h-8 border border-black cursor-pointer">` : ''}
        </div>
      </div>`;
    }
    if (preset.controls.includes('rot-deg'))     html += sRow('rot','Angle (°)',-360,360,1,'rotDeg');
    if (preset.controls.includes('pop-scale'))   html += sRow('pop-scale','Peak scale',-2,5,0.05,'popScale');
    if (preset.controls.includes('float-dist'))  html += sRow('float-dist','Distance (px)',-200,200,1,'floatDist');
    if (preset.controls.includes('bounce-h'))    html += sRow('bounce-h','Height (px)',-200,200,1,'bounceH');
    if (preset.controls.includes('pulse-scale')) html += sRow('pulse-scale','Scale peak',-2,3,0.05,'pulseScale');
    if (preset.controls.includes('orbit-r'))     html += sRow('orbit-r','Orbit radius (px)',-500,500,1,'orbitR');
    if (preset.controls.includes('glitch-int'))  html += sRow('glitch','Intensity',0.2,3,0.1,'glitchInt');
    if (preset.controls.includes('rgb-split'))   html += sRow('rgb-split','Split Dist',-20,20,1,'rgbSplit');
    if (preset.controls.includes('xray-op'))     html += sRow('xray-op','Opacity',0,1,0.05,'xrayOp');
    if (preset.controls.includes('glow-color')) {
      html += `<div class="space-y-1.5">
        <span class="text-xs text-stone-600">Glow colour</span>
        <input type="color" value="${p.glowColor||'#FE7143'}" onchange="setPPDirect('glowColor',this.value)" class="w-full h-9 border border-black cursor-pointer">
      </div>`;
    }
    if (preset.controls.includes('glow-size'))   html += sRow('glow-size','Glow size (px)',0,60,1,'glowSize');
    if (preset.controls.includes('mask-dir')) {
      const dirs = ['top','bottom','left','right'];
      html += `<div class="space-y-1.5">
        <span class="text-xs text-stone-600">Mask direction</span>
        <div class="grid grid-cols-2 gap-1">
          ${dirs.map(d => `<button onclick="setPP('maskDir','${d}',null,null)" class="py-1.5 text-[10px] font-bold border border-black transition-colors ${p.maskDir===d?'bg-black text-white':'bg-white hover:bg-stone-100'} uppercase">${d}</button>`).join('')}
        </div>
      </div>`;
    }

    html += '</div>';
    return html;
  }
