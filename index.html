  // ═══════════════════════════════════════════════════════════════════════════
  // EASING HELPERS
  // ═══════════════════════════════════════════════════════════════════════════
  const EASINGS = [
    ['linear','Linear'],['ease-in','Ease In'],['ease-out','Ease Out'],['ease-in-out','Ease In Out'],
    ['cubic-bezier(0.34,1.56,0.64,1)','Ease Out Back'],['cubic-bezier(0.175,0.885,0.32,1.275)','Bouncy'],
    ['cubic-bezier(0.16,1,0.3,1)','Gentle'],['cubic-bezier(0.22,1,0.36,1)','Quick'],
    ['steps(1,end)','Instant'],
  ];
  function easingLabel(v) { const e = EASINGS.find(([val])=>val===v); return e ? e[1] : 'Ease Out'; }

  function toggleEasingDrop(e) { if(e) e.stopPropagation(); document.getElementById('easing-drop')?.classList.toggle('hidden'); }
  function pickEasingByIdx(idx, e) {
    if(e) e.stopPropagation();
    const l = getSelLayer(); if(!l) return;
    const pair = EASINGS[idx]; if(!pair) return;
    l.easing = pair[0];
    const lbl = document.getElementById('easing-lbl'); if(lbl) lbl.textContent = pair[1];
    document.getElementById('easing-drop')?.classList.add('hidden');
    renderGraphic();
  }

  function toggleStrokeModeDrop(e) { if(e) e.stopPropagation(); document.getElementById('stroke-mode-drop')?.classList.toggle('hidden'); }
  function pickStrokeMode(mode, e) {
    if(e) e.stopPropagation();
    setPP('stroke-color-mode', mode);
    document.getElementById('stroke-mode-drop')?.classList.add('hidden');
  }

  function pct(v, min, max) { return Math.max(0, Math.min(100, Math.round(((v-min)/(max-min))*100))); }

  // ═══════════════════════════════════════════════════════════════════════════
  // LAYER MUTATIONS
  // ═══════════════════════════════════════════════════════════════════════════
  function getSelLayer() { return S.layers.find(l => l.id === S.sel) || null; }

  function setLP(prop, val) {
    const l = getSelLayer(); if(!l) return;
    l[prop] = val;
    renderGraphic(); buildTimeline(); buildRightPanel();
  }

  function setLPNum(prop, val, min, max) {
    const l = getSelLayer(); if(!l) return;
    let v = parseFloat(val); if(isNaN(v)) return;
    v = Math.max(min, Math.min(max, v));
    l[prop] = v;
    const slider = document.getElementById(`rp-${prop}-slider`);
    if(slider) { slider.value = v; slider.style.setProperty('--rp', pct(v,parseFloat(slider.min),parseFloat(slider.max))+'%'); }
    renderGraphic(); buildTimeline();
  }

  function setLPSlider(prop, val, displayId) {
    const l = getSelLayer(); if(!l) return;
    l[prop] = parseFloat(val);
    const el = document.getElementById(displayId); if(el) el.value = parseFloat(val).toFixed(2);
    const sl = document.getElementById(`rp-${prop}-slider`);
    if(sl) sl.style.setProperty('--rp', pct(parseFloat(val),parseFloat(sl.min),parseFloat(sl.max))+'%');
    renderGraphic(); buildTimeline();
  }

  function setScale(val) {
    S.scale = parseFloat(val) || 1;
    const sl = document.getElementById('scale-slider');
    if(sl) { sl.value = S.scale; sl.style.setProperty('--rp', pct(S.scale, 0.1, 3) + '%'); }
    const ct = document.getElementById('canvas-target');
    if (ct) {
      ct.style.transform = `scale(${S.scale})`;
      ct.style.transformOrigin = 'center center';
    }
  }

  function setScaleSlider(val) {
    S.scale = parseFloat(val);
    const sl = document.getElementById('scale-slider');
    if (sl) sl.style.setProperty('--rp', Math.round(((S.scale-0.1)/(3-0.1))*100) + '%');
    const ct = document.getElementById('canvas-target');
    if (ct) {
      ct.style.transform = `scale(${S.scale})`;
      ct.style.transformOrigin = 'center center';
    }
    const rpDur = document.getElementById('rp-scale-val');
    if(rpDur) rpDur.value = S.scale.toFixed(2);
  }

  function setPP(key, val, min, max) {
    const l = getSelLayer(); if(!l) return;
    if(typeof min === 'number' && typeof max === 'number') { let v=parseFloat(val); if(isNaN(v)) return; val=Math.max(min,Math.min(max,v)); }
    l.params[key] = val;
    renderGraphic(); buildRightPanel();
  }
  function setPPSlider(key, val, displayId) {
    const l = getSelLayer(); if(!l) return;
    l.params[key] = parseFloat(val);
    const el=document.getElementById(displayId); if(el) el.value=parseFloat(val).toFixed(2);
    // Find the slider by the display ID pattern: pc-XXX-val -> pc-XXX-sl
    const slId = displayId.replace('-val', '-sl');
    const sl=document.getElementById(slId);
    if(sl) sl.style.setProperty('--rp',pct(parseFloat(val),parseFloat(sl.min),parseFloat(sl.max))+'%');
    renderGraphic();
  }
  function setPPDirect(key, val) {
    const l = getSelLayer(); if(!l) return;
    l.params[key] = val;
    renderGraphic();
  }

  function toggleVis(id) {
    const l = S.layers.find(l => l.id === id); if(!l) return;
    l.visible = !l.visible;
    renderGraphic(); buildTimeline(); if(S.sel===id) buildRightPanel();
  }

  function removeLayer(id) {
    S.layers = S.layers.filter(l => l.id !== id);
    if(S.sel === id) S.sel = S.layers[0]?.id || null;
    refreshAll();
  }

  function deleteProject() {
    if (confirm("Delete this project? All uploaded assets and layers will be removed and you'll start fresh.")) {
      S.file = null;
      S.layers = [];
      S.sel = null;
      S.bg = 'grid';
      S.size = '400x400';
      S.scale = 1;
      S.time = 0;
      if (S.playing) togglePlay();
      refreshAll();
      setBg(S.bg);
      applySize(S.size);
    }
  }

  function newProject() {
    if (S.file || S.layers.length) {
      if (!confirm("Start a new project? Unsaved changes will be lost.")) return;
    }
    S.file = null;
    S.layers = [];
    S.sel = null;
    S.bg = 'grid';
    S.size = '400x400';
    S.scale = 1;
    S.time = 0;
    if (S.playing) togglePlay();
    // Open file picker to upload asset for the new project
    refreshAll();
    setBg(S.bg);
    applySize(S.size);
    setTimeout(() => document.getElementById('file-upload').click(), 200);
  }

  function duplicateLayer(id) {
    const src = S.layers.find(l => l.id === id); if(!src) return;
    const copy = JSON.parse(JSON.stringify(src));
    copy.id = newLayerId();
    copy.delay = src.delay + src.duration;
    S.layers.push(copy);
    S.sel = copy.id;
    refreshAll();
  }

  function toggleCustomBgDrop(e) {
    if (e) e.stopPropagation();
    document.getElementById('bg-custom-drop')?.classList.toggle('hidden');
    setBg('custom');
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // CANVAS CONTROLS / BACKGROUNDS
  // ═══════════════════════════════════════════════════════════════════════════
  const BG_CLASSES = {
    grid:'bg-white bg-grid', transparent:'bg-transparent bg-checkerboard', dark:'bg-black', light:'bg-stone-50'
  };
  function setBg(bg) {
    S.bg = bg;
    const c = document.getElementById('canvas-target');
    const colorInput = document.getElementById('bg-custom-color');
    
    document.querySelectorAll('#bg-toggles button').forEach(b => {
      if (!b.id.startsWith('bg-')) return;
      const isSel = b.id === 'bg-'+bg;
      b.className = b.className.replace(/bg-brand-orange text-white hover:bg-orange-600|bg-white text-stone-500 hover:bg-stone-100/g, '').trim();
      b.className += isSel ? ' bg-brand-orange text-white hover:bg-orange-600' : ' bg-white text-stone-500 hover:bg-stone-100';
    });

    if (c) {
      if (bg === 'custom') {
        const customCol = colorInput ? colorInput.value : '#ffffff';
        c.style.backgroundColor = customCol;
        c.className = 'relative flex items-center justify-center border border-black shadow-[4px_4px_0_rgba(0,0,0,1)] overflow-hidden';
      } else {
        c.style.backgroundColor = '';
        c.className = 'relative flex items-center justify-center border border-black shadow-[4px_4px_0_rgba(0,0,0,1)] overflow-hidden ' + (BG_CLASSES[bg] || 'bg-white');
      }
    }
  }

  function setCustomBgColor(color) {
    const cCol = document.getElementById('bg-custom-color');
    const cHex = document.getElementById('bg-custom-hex');
    if (cCol) cCol.value = color;
    if (cHex) cHex.value = color;
    setBg('custom');
  }

  function toggleSizeDrop(e) { if(e) e.stopPropagation(); document.getElementById('size-drop')?.classList.toggle('hidden'); }
  function pickSize(sz, e) { if(e) e.stopPropagation(); applySize(sz); document.getElementById('size-drop')?.classList.add('hidden'); }
  function applyCustomSize() {
    const w=Math.max(50,Math.min(1000,parseInt(document.getElementById('cw').value)||400));
    const h=Math.max(50,Math.min(1000,parseInt(document.getElementById('ch').value)||400));
    applySize(`${w}x${h}`);
  }
  function applySize(sz) {
    S.size = sz;
    const [w,h] = sz.split('x');
    const c = document.getElementById('canvas-target');
    c.style.width = w+'px'; c.style.height = h+'px';
    const lbl = document.getElementById('size-lbl'); if(lbl) lbl.textContent = `${w}×${h}`;
    const cw=document.getElementById('cw'),ch=document.getElementById('ch');
    if(cw) cw.value=w; if(ch) ch.value=h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // FILE UPLOAD
  // ═══════════════════════════════════════════════════════════════════════════
  document.getElementById('file-upload').onchange = function(e) {
    const file = e.target.files[0]; if(!file) return;
    const fn = file.name.toLowerCase();
    const isSvg = file.type==='image/svg+xml' || fn.endsWith('.svg');
    const isImg = file.type.startsWith('image/') || /\.(png|jpg|jpeg|webp)$/.test(fn);
    const reader = new FileReader();
    if(isSvg) {
      reader.onload = ev => { S.file={type:'svg',data:ev.target.result,name:file.name}; refreshAll(); };
      reader.readAsText(file);
    } else if(isImg) {
      reader.onload = ev => { S.file={type:'png',data:ev.target.result,name:file.name}; refreshAll(); };
      reader.readAsDataURL(file);
    } else {
      alert('Please upload SVG, PNG or JPG.');
    }
    e.target.value = '';
  };

  document.getElementById('json-import').onchange = function(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const cfg = JSON.parse(ev.target.result);
        // Validate it's a Vibe on Motion project file
        if (!cfg.layers && !cfg.file) { alert('This does not appear to be a Vibe on Motion project file.'); return; }
        if (cfg.file)    S.file    = cfg.file;
        if (cfg.layers)  S.layers  = cfg.layers;
        if (cfg.scale)   S.scale   = cfg.scale;
        if (cfg.sel)     S.sel     = cfg.sel;
        if (cfg.size)    S.size    = cfg.size;
        if (cfg.bg)      S.bg      = cfg.bg;
        if (cfg.compDur) S.compDur = cfg.compDur;
        refreshAll();
        setBg(S.bg);
        applySize(S.size);
        const durEl = document.getElementById('comp-dur-val');
        if (durEl) durEl.value = S.compDur.toFixed(1);
      } catch(err) { alert('Could not load project: '+err.message); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  function resetLayer(id) {
    const l = S.layers.find(x => x.id === id); if(!l) return;
    const fresh = mkLayer(l.presetId); if(!fresh) return;
    Object.assign(l, { duration:fresh.duration, delay:fresh.delay, easing:fresh.easing, direction:fresh.direction, playback:fresh.playback, params:{...fresh.params} });
    refreshAll();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // PLAYBACK
  // ═══════════════════════════════════════════════════════════════════════════
  function togglePlay() {
    S.playing = !S.playing;
    const btn = document.getElementById('play-btn');
    if(btn) btn.innerHTML = S.playing ? '<i data-lucide="pause" class="w-3.5 h-3.5"></i>' : '<i data-lucide="play" class="w-3.5 h-3.5"></i>';
    lucide.createIcons();
    if(S.playing) {
      rafStart = performance.now() - S.time * 1000;
      raf = requestAnimationFrame(tick);
    } else {
      if(raf) cancelAnimationFrame(raf); raf = null;
    }
    renderGraphic();
  }

  function tick(ts) {
    if(!S.playing) return;
    const total = getTotalDur();
    const newTime = (ts - rafStart) / 1000;
    if (newTime >= total) {
      rafStart = ts;
      S.time = 0;
      renderGraphic();
    } else {
      S.time = newTime;
      renderGraphic();
    }
    updatePlayhead();
    raf = requestAnimationFrame(tick);
  }

  function restartAnim() {
    S.time = 0;
    if(raf) cancelAnimationFrame(raf);
    raf = null;
    if(S.playing) {
      rafStart = performance.now();
      raf = requestAnimationFrame(tick);
    } else {
      renderGraphic();
      updatePlayhead();
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // EXPORTS
  // ═══════════════════════════════════════════════════════════════════════════
  function exportJSON() {
    const cfg = { layers: S.layers, scale: S.scale, sel: S.sel, size: S.size, bg: S.bg, file: S.file, compDur: S.compDur };
    const blob = new Blob([JSON.stringify(cfg, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (S.file ? S.file.name.replace(/\.[^.]+$/, '') + '-vibe' : 'vibe-project') + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  function copyCodeJSON() {
    if (!S.layers.length) { alert('No animations applied yet. Add a preset first.'); return; }
    // Build CSS keyframe + class for each visible layer
    const lines = [];
    lines.push('/* === Vibe on Motion — CSS Animation Code === */');
    lines.push('/* Paste these styles into your stylesheet,     */');
    lines.push('/* then add class "vom-animated" to any element */');
    lines.push('');

    // Collect unique keyframe names
    const usedKf = [...new Set(S.layers.filter(l => l.visible).map(l => l.kf))];
    usedKf.forEach(kf => {
      // Map known keyframe names to their definitions
      const kfMap = {
        'kf-fade':        '@keyframes kf-fade        { 0%{opacity:0} 100%{opacity:1} }',
        'kf-slide':       '@keyframes kf-slide       { 0%{transform:translate(var(--slide-x,-40px),var(--slide-y,0));opacity:var(--slide-fade,0)} 100%{transform:translate(0,0);opacity:1} }',
        'kf-move':        '@keyframes kf-move        { 0%{transform:translate(var(--slide-x,-40px),var(--slide-y,0))} 100%{transform:translate(0,0)} }',
        'kf-grow':        '@keyframes kf-grow        { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }',
        'kf-shrink':      '@keyframes kf-shrink      { 0%{transform:scale(1.6);opacity:0} 100%{transform:scale(1);opacity:1} }',
        'kf-spin':        '@keyframes kf-spin        { 0%{transform:rotate(0deg)} 100%{transform:rotate(var(--rot-deg,360deg))} }',
        'kf-float':       '@keyframes kf-float       { 0%,100%{transform:translateY(0)} 50%{transform:translateY(var(--float-y,-24px))} }',
        'kf-bounce':      '@keyframes kf-bounce      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(var(--bounce-y,-36px))} }',
        'kf-pulse':       '@keyframes kf-pulse       { 0%,100%{transform:scale(1)} 50%{transform:scale(var(--pulse-scale,1.1))} }',
        'kf-rotate':      '@keyframes kf-rotate      { 0%{transform:rotate(0deg)} 100%{transform:rotate(var(--rot-deg,360deg))} }',
        'kf-blur':        '@keyframes kf-blur        { 0%{filter:blur(var(--blur-px,20px))} 100%{filter:blur(0)} }',

        'kf-jelly':       '@keyframes kf-jelly       { 0%,100%{transform:scale(1,1)} 30%{transform:scale(1.2,.8)} 50%{transform:scale(.9,1.15)} 70%{transform:scale(1.05,.95)} }',
        'kf-luxury':      '@keyframes kf-luxury      { 0%{transform:translateY(20px) scale(.96);opacity:0;filter:blur(8px)} 100%{transform:translateY(0) scale(1);opacity:1;filter:blur(0)} }',
        'kf-loot-glow':   '@keyframes kf-loot-glow   { 0%,100%{filter:drop-shadow(0 0 4px gold) brightness(1)} 50%{filter:drop-shadow(0 0 20px gold) drop-shadow(0 0 40px gold) brightness(1.4)} }',
        'kf-hover-bounce':'@keyframes kf-hover-bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }',
        'kf-card-lift':   '@keyframes kf-card-lift   { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-8px) scale(1.02)} }',
      };
      if (kfMap[kf]) lines.push(kfMap[kf]);
    });

    lines.push('');

    // Generate a class per layer
    S.layers.filter(l => l.visible).forEach((l, i) => {
      const p = l.params || {};
      const iters = 'infinite'; // loops always show infinite; one-shots show '1'
      const preset = getPreset(l.presetId);
      const isLoop = preset ? preset.loop : false;
      const vars = [];
      if (p.blurAmt     !== undefined) vars.push(`  --blur-px: ${p.blurAmt}px;`);
      if (p.rotDeg      !== undefined) { vars.push(`  --rot-deg: ${p.rotDeg}deg;`); }
      if (p.floatDist   !== undefined) vars.push(`  --float-y: -${p.floatDist}px;`);
      if (p.bounceH     !== undefined) vars.push(`  --bounce-y: -${p.bounceH}px;`);
      if (p.pulseScale  !== undefined) vars.push(`  --pulse-scale: ${p.pulseScale};`);
      if (p.popScale    !== undefined) vars.push(`  --pop-scale: ${p.popScale};`);
      if (p.glowColor   !== undefined) vars.push(`  --glow-color: ${p.glowColor};`);
      if (p.slideDist   !== undefined) {
        const dir = p.slideDir || 'left';
        const x = (dir==='left'?-1:dir==='right'?1:0) * p.slideDist;
        const y = (dir==='top'?-1:dir==='bottom'?1:0) * p.slideDist;
        vars.push(`  --slide-x: ${x}px;`);
        vars.push(`  --slide-y: ${y}px;`);
      }
      if (l.presetId === 'trim-paths') {
        vars.push(`  /* Tip: set --path-len on each path to its getTotalLength() for accurate timing */`);
        vars.push(`  --path-len: 2000;`);
        vars.push(`  stroke-dasharray: var(--path-len);`);
        vars.push(`  fill: transparent;`);
        vars.push(`  stroke-width: ${p['stroke-width'] ?? 2}px;`);
        vars.push(`  stroke-linecap: ${p['stroke-cap'] ?? 'round'};`);
        vars.push(`  stroke: ${p['stroke-c1'] || '#FE7143'};`);
      }

      let kf = l.kf;
      if (l.presetId === 'mask-reveal' && p.maskDir) kf = 'kf-mask-' + p.maskDir;

      lines.push(`.vom-layer-${i+1} {`);
      if (vars.length) lines.push(...vars);
      lines.push(`  animation: ${kf} ${l.duration}s ${l.easing} ${l.delay}s ${isLoop ? 'infinite' : '1'} ${l.direction === 'out' ? 'reverse' : 'normal'} forwards;`);
      lines.push('}');
      lines.push('');
    });

    lines.push('/* HTML usage example:');
    S.layers.filter(l => l.visible).forEach((l, i) => {
      lines.push(`  <div class="vom-layer-${i+1}">`);
      if (i === S.layers.filter(x => x.visible).length - 1) lines.push('    <!-- your content here -->');
      lines.push('  </div>');
    });
    lines.push('*/');

    const code = lines.join('\n');
    try {
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copy-btn-lbl');
        if (btn) { btn.textContent = '✓ COPIED!'; setTimeout(() => btn.textContent = 'COPY CSS CODE', 2000); }
      }).catch(() => fallbackCopy(code));
    } catch(e) { fallbackCopy(code); }
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copy-btn-lbl');
    if (btn) { btn.textContent = '✓ COPIED!'; setTimeout(() => btn.textContent = 'COPY CSS CODE', 2000); }
  }

  async function loadGifshot() {
    if (window.gifshot) return window.gifshot;
    return new Promise((resolve, reject) => {
      console.log("gifshot not found. Attempting fallback CDN...");
      const s = document.createElement('script');
      s.src = "https://cdn.jsdelivr.net/npm/gifshot@0.4.5/dist/gifshot.min.js";
      s.onload = () => {
        if (window.gifshot) resolve(window.gifshot);
        else reject(new Error("Loaded script did not define gifshot"));
      };
      s.onerror = () => {
        const s2 = document.createElement('script');
        s2.src = "https://unpkg.com/gifshot@0.4.5/dist/gifshot.min.js";
        s2.onload = () => {
          if (window.gifshot) resolve(window.gifshot);
          else reject(new Error("Loaded unpkg script did not define gifshot"));
        };
        s2.onerror = () => reject(new Error("Failed to load gifshot. Check your internet connection."));
        document.head.appendChild(s2);
      };
      document.head.appendChild(s);
    });
  }


  // Pre-rasterize SVG to a clean PNG data URL to avoid canvas taint
  function rasterizeSvgToDataURL(svgString, width, height) {
    return new Promise((resolve, reject) => {
      const offCanvas = document.createElement('canvas');
      offCanvas.width = width || 400;
      offCanvas.height = height || 400;
      const offCtx = offCanvas.getContext('2d');
      const svgBase64 = btoa(unescape(encodeURIComponent(svgString)));
      const dataUri = 'data:image/svg+xml;base64,' + svgBase64;
      const img = new Image();
      img.onload = () => {
        offCtx.clearRect(0, 0, offCanvas.width, offCanvas.height);
        offCtx.drawImage(img, 0, 0, offCanvas.width, offCanvas.height);
        try { resolve(offCanvas.toDataURL('image/png')); }
        catch(e) { reject(e); }
      };
      img.onerror = () => reject(new Error('SVG rasterization failed'));
      img.src = dataUri;
    });
  }

  // ── Lottie Export (transform-based presets) ──────────────────────────────
  // Supports: fade, grow, shrink, spin, rotate, move*, pulse, float, bounce, wiggle, wave
  // Effects like blur/glitch/mask are skipped (no Lottie equivalent).
  function generateLottieJSON(state, assetDataUrl, assetW, assetH) {
    const [wStr, hStr] = (state.size || '400x400').split('x');
    const W = parseInt(wStr) || 400, H = parseInt(hStr) || 400;
    const fr = 30, totalDur = state.compDur || 5, op = Math.round(totalDur * fr);
    const cx = W/2, cy = H/2;
    const visLayers = state.layers.filter(l => l.visible);
    const ease = { i:{x:0.42,y:1}, o:{x:0.58,y:0} };
    const staticVal = (v) => ({ a: 0, k: v });
    const animVal = (kfs) => ({ a: 1, k: kfs });
    const maxSz = Math.min(W,H)*0.8;
    let dw=maxSz, dh=maxSz;
    if (assetW && assetH) { const ar=assetW/assetH; if(ar>1) dh=dw/ar; else dw=dh*ar; }
    function sampleAt(t) {
      let tx=0,ty=0,sc=1,rot=0,opacity=1;
      visLayers.forEach(l => {
        const p=l.params||{}, delay=l.delay||0, dur=l.duration||1.5, id=l.presetId;
        const isLoop=['float','pulse','bounce','rotate','spin','wiggle','wave'].includes(id);
        let prog;
        if(isLoop){ prog=((t-delay)/dur)%1; if(t<delay)prog=0; if(prog<0)prog=0; }
        else { if(t<delay)prog=0; else if(t>delay+dur)prog=1; else prog=(t-delay)/dur; }
        const dist=p.slideDist||60;
        if(id==='fade'){opacity*=(t<delay?0:prog);}
        else if(id==='grow'){sc*=prog;opacity*=prog;}
        else if(id==='shrink'){sc*=(1.6-0.6*prog);opacity*=prog;}
        else if(id==='spin'){rot+=-((p.rotDeg||360))*(1-prog);sc*=prog;opacity*=prog;}
        else if(id==='rotate'){rot+=(p.rotDeg||360)*prog;}
        else if(id.indexOf('move')===0){
          const dir=p.slideDir||(id==='move-in-right'?'right':id==='move-in-left'?'left':id==='move-top'?'top':id==='move-bottom'?'bottom':'left');
          const dx=(dir==='left'?-1:dir==='right'?1:0)*dist, dy=(dir==='top'?-1:dir==='bottom'?1:0)*dist;
          tx+=(1-prog)*dx; ty+=(1-prog)*dy;
        }
        else if(id==='pulse'){const peak=(p.pulseScale||1.1);sc*=(1+(peak-1)*Math.sin(prog*Math.PI));}
        else if(id==='float'){ty+=-Math.sin(prog*2*Math.PI)*(p.floatDist||24);}
        else if(id==='bounce'){ty+=-Math.abs(Math.sin(prog*Math.PI))*(p.bounceH||36);}
        else if(id==='wiggle'){rot+=Math.sin(prog*2*Math.PI)*6;}
        else if(id==='wave'){rot+=Math.sin(prog*2*Math.PI)*5;ty+=Math.sin(prog*2*Math.PI)*-6;}
      });
      return {tx,ty,sc,rot,op:opacity};
    }
    const posKf=[],scaleKf=[],rotKf=[],opKf=[];
    for(let f=0;f<=op;f++){
      const t=f/fr, s=sampleAt(t);
      posKf.push({t:f,s:[cx+s.tx,cy+s.ty,0]});
      scaleKf.push({t:f,s:[s.sc*100,s.sc*100,100]});
      rotKf.push({t:f,s:[s.rot]});
      opKf.push({t:f,s:[Math.max(0,Math.min(1,s.op))*100]});
    }
    function maybeStatic(kfs){
      const first=JSON.stringify(kfs[0].s);
      if(kfs.every(k=>JSON.stringify(k.s)===first)) return staticVal(kfs[0].s.length===1?kfs[0].s[0]:kfs[0].s);
      return animVal(kfs.map((k,i)=>i<kfs.length-1?{...k,...ease}:k));
    }
    return {
      v:"5.7.4",fr:fr,ip:0,op:op,w:W,h:H,nm:"Vibe on Motion Export",ddd:0,
      assets:[{id:"asset_0",w:Math.round(assetW||dw),h:Math.round(assetH||dh),u:"",p:assetDataUrl,e:1}],
      layers:[{ddd:0,ind:1,ty:2,nm:"Graphic",refId:"asset_0",sr:1,
        ks:{o:maybeStatic(opKf),r:maybeStatic(rotKf),p:maybeStatic(posKf),
            a:staticVal([(assetW||dw)/2,(assetH||dh)/2,0]),s:maybeStatic(scaleKf)},
        ao:0,ip:0,op:op,st:0,bm:0}],
      markers:[]
    };
  }

  function exportLottie() {
    if(!S.file){ alert('No file uploaded.'); return; }
    const supported = ['fade','grow','shrink','spin','rotate','move-in-right','move-in-left','move-top','move-bottom','pulse','float','bounce','wiggle','wave'];
    const visLayers = S.layers.filter(l => l.visible);
    const unsupported = visLayers.filter(l => !supported.includes(l.presetId)).map(l => l.name);
    if (visLayers.length && unsupported.length === visLayers.length) {
      alert('None of your current animations can be exported to Lottie. Lottie supports transform presets (fade, scale, move, rotate, pulse, float, bounce, etc.) but not effects like blur, glitch, or mask.');
      return;
    }
    const proceed = () => {
      // Determine asset dimensions
      const finishExport = (dataUrl, aw, ah) => {
        try {
          const lottie = generateLottieJSON(S, dataUrl, aw, ah);
          const blob = new Blob([JSON.stringify(lottie)], {type:'application/json'});
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = (S.file.name ? S.file.name.replace(/\.[^.]+$/, '') : 'vibe-on-motion') + '.json';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(a.href);
          if (unsupported.length) {
            setTimeout(() => alert('Lottie exported! Note: these effects were skipped (no Lottie equivalent): ' + unsupported.join(', ')), 300);
          }
        } catch(e) { alert('Lottie export failed: ' + e.message); }
      };
      if (S.file.type === 'svg') {
        // Rasterize SVG to PNG data URL for embedding (Lottie image layer)
        const [wStr,hStr] = (S.size||'400x400').split('x');
        const cw = parseInt(wStr)||400, ch = parseInt(hStr)||400;
        rasterizeSvgToDataURL(S.file.data, cw, ch).then(png => {
          const im = new Image();
          im.onload = () => finishExport(png, im.width, im.height);
          im.onerror = () => finishExport(png, cw, ch);
          im.src = png;
        }).catch(() => {
          finishExport('data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(S.file.data))), 300, 300);
        });
      } else {
        const im = new Image();
        im.onload = () => finishExport(S.file.data, im.width, im.height);
        im.onerror = () => finishExport(S.file.data, 300, 300);
        im.src = S.file.data;
      }
    };
    proceed();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // GIF EXPORT — frame-capture via html-to-image (captures ALL visible effects)
  // ═══════════════════════════════════════════════════════════════════════════
  function _loadScript(src){
    return new Promise((res,rej)=>{
      if([...document.scripts].some(s=>s.src===src)) return res();
      const sc=document.createElement('script'); sc.src=src;
      sc.onload=()=>res(); sc.onerror=()=>rej(new Error('Failed to load '+src));
      document.head.appendChild(sc);
    });
  }

  async function _ensureLibs(){
    if(!window.htmlToImage) await _loadScript('https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js');
    if(!window.GIF) await _loadScript('https://cdn.jsdelivr.net/npm/gif.js.optimized@1.0.1/dist/gif.js');
  }

  // gif.js needs a worker script. Loading it cross-origin (from a CDN) makes the
  // browser throw "The operation is insecure" when the worker touches the canvas.
  // Fix: fetch the worker source once and serve it from a SAME-ORIGIN blob URL.
  const _GIF_WORKER_CDN='https://cdn.jsdelivr.net/npm/gif.js.optimized@1.0.1/dist/gif.worker.js';
  let _gifWorkerBlobURL=null;
  async function _getGifWorkerURL(){
    if(_gifWorkerBlobURL) return _gifWorkerBlobURL;
    const resp=await fetch(_GIF_WORKER_CDN);
    if(!resp.ok) throw new Error('Could not load GIF worker ('+resp.status+')');
    const code=await resp.text();
    const blob=new Blob([code],{type:'application/javascript'});
    _gifWorkerBlobURL=URL.createObjectURL(blob);
    return _gifWorkerBlobURL;
  }

  function _setGifLoading(on,label){
    ['gif-btn','gif-btn2'].forEach(id=>{
      const b=document.getElementById(id); if(!b) return;
      b.disabled=on;
      b.innerHTML = on
        ? `<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i><span>${label||'Building…'}</span>`
        : '<i data-lucide="film" class="w-3.5 h-3.5"></i><span>EXPORT GIF</span>';
    });
    if(window.lucide) lucide.createIcons();
  }

  async function exportGIF(){
    if(!S.file){ alert('Upload a file and apply a preset first.'); return; }
    if(!S.layers.filter(l=>l.visible).length){ alert('Apply at least one preset first.'); return; }

    const wrap = document.getElementById('graphic-wrapper');
    if(!wrap){ alert('Nothing to export.'); return; }

    _setGifLoading(true,'Loading…');

    // Remember UI state so we can restore it after capture
    const prevPlaying = S.playing;
    const prevTime    = S.time;
    if(prevPlaying){ S.playing=false; }   // pause; we drive frames manually

    try{
      await _ensureLibs();

      const [wStr,hStr] = (S.size||'400x400').split('x');
      const cw = parseInt(wStr)||400, ch = parseInt(hStr)||400;

      const total = (typeof getTotalDur==='function') ? getTotalDur() : (S.compDur||S.duration||3);
      const FPS = 25;
      const N   = Math.max(2, Math.ceil(total*FPS));

      // background colour for the GIF (gif.js has no alpha)
      let bgHex = '#ffffff';
      if(S.bg==='dark') bgHex='#000000';
      else if(S.bg==='light') bgHex='#fafaf9';
      else if(S.bg==='custom'){ const el=document.getElementById('bg-custom-color'); if(el) bgHex=el.value; }

      // Same-origin worker URL (fixes "operation is insecure" / cross-origin Worker)
      const workerURL = await _getGifWorkerURL();

      const gif = new GIF({
        workers: 2,
        quality: 10,
        width: cw,
        height: ch,
        workerScript: workerURL,
        background: bgHex,
        transparent: null
      });

      const delayMs = Math.round(1000/FPS);

      // Options tuned to avoid "tainted canvas / operation is insecure":
      //  - skipFonts/fontEmbedCSS: don't fetch cross-origin fonts
      //  - filter: drop any external <image>/<use href=http> nodes that taint the canvas
      const _filter = (node) => {
        if(!node || !node.tagName) return true;
        const tag = node.tagName.toLowerCase();
        if(tag === 'image'){
          const href = node.getAttribute && (node.getAttribute('href') || node.getAttribute('xlink:href') || '');
          if(href && /^https?:\/\//i.test(href) && href.indexOf(location.origin)!==0) return false;
        }
        return true;
      };
      const _captureOpts = {
        width: cw,
        height: ch,
        pixelRatio: 1,
        backgroundColor: bgHex,
        cacheBust: true,
        skipFonts: true,
        fontEmbedCSS: '',
        filter: _filter,
        style: { transform:'none', margin:'0' }  // capture upright, ignore zoom
      };

      // Capture each frame: set S.time, re-render DOM (negative-delay seek), snapshot
      for(let i=0;i<N;i++){
        const t = (i/(N-1))*total;
        S.time = t;
        renderGraphic();                    // seeks every layer to time t, paused
        // give the browser a tick to apply styles & lay out
        await new Promise(r=>requestAnimationFrame(()=>r()));

        let frameCanvas;
        try{
          // toCanvas feeds gif.js directly (no second Image decode)
          frameCanvas = await htmlToImage.toCanvas(wrap, _captureOpts);
        }catch(e){
          // Fallback: try the PNG path; if that also fails, skip this frame
          try{
            const durl = await htmlToImage.toPng(wrap, _captureOpts);
            frameCanvas = await new Promise((res,rej)=>{
              const im=new Image();
              im.onload=()=>{ const c=document.createElement('canvas'); c.width=cw;c.height=ch; const cx=c.getContext('2d'); cx.fillStyle=bgHex; cx.fillRect(0,0,cw,ch); cx.drawImage(im,0,0,cw,ch); res(c); };
              im.onerror=rej; im.src=durl;
            });
          }catch(e2){
            console.warn('Frame '+i+' skipped:', e2.message);
            continue;
          }
        }
        gif.addFrame(frameCanvas,{delay:delayMs,copy:true});

        _setGifLoading(true,`Frame ${i+1}/${N}`);
      }

      await new Promise((resolve,reject)=>{
        gif.on('finished',(blob)=>{
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');
          a.href=url;
          a.download=(S.file&&S.file.name?S.file.name.replace(/\.[^.]+$/,''):'vibe-on-motion')+'.gif';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
          resolve();
        });
        gif.on('abort',()=>reject(new Error('GIF render aborted')));
        gif.render();
      });

    }catch(err){
      console.error(err);
      alert('GIF export failed: '+err.message);
    }finally{
      // restore UI state
      S.time = prevTime;
      S.playing = prevPlaying;
      renderGraphic();
      _setGifLoading(false);
    }
  }


  // ═══════════════════════════════════════════════════════════════════════════
  // REFRESH ALL
  // ═══════════════════════════════════════════════════════════════════════════
  function refreshAll() {
    buildPresets();
    renderGraphic();
    buildTimeline();
    buildRightPanel();
  }

  function initScrubbing() {
    const ruler = document.getElementById('tl-ruler');
    const scroll = document.getElementById('tl-scroll');
    if (!ruler || !scroll) return;

    const onScrub = (ev, container) => {
      if (ev.button !== 0) return; // Left click only
      if (ev.target.tagName === 'INPUT' || ev.target.tagName === 'BUTTON') return;
      ev.preventDefault();
      
      const wasPlaying = S.playing;
      if (wasPlaying) togglePlay(); // Pause playback while scrubbing

      const handler = (e) => {
        const rect = container.getBoundingClientRect();
        let x = e.clientX - rect.left + container.scrollLeft;
        x = Math.max(0, Math.min(getTotalDur() * PX_PER_SEC, x));
        S.time = Math.round((x / PX_PER_SEC) * 100) / 100;
        updatePlayhead();
        renderGraphic();
      };

      handler(ev);

      const mm = (e) => handler(e);
      const mu = () => {
        window.removeEventListener('mousemove', mm);
        window.removeEventListener('mouseup', mu);
      };
      window.addEventListener('mousemove', mm);
      window.addEventListener('mouseup', mu);
    };

    ruler.addEventListener('mousedown', (ev) => onScrub(ev, ruler));
    scroll.addEventListener('mousedown', (ev) => {
      if (ev.target.closest('.seg-block')) return;
      onScrub(ev, scroll);
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════════════════════
  function init() {
    refreshAll();
    setBg(S.bg);
    applySize(S.size);
    lucide.createIcons();
    initScrubbing();

    // Close dropdowns on outside click
    window.addEventListener('click', () => {
      document.getElementById('size-drop')?.classList.add('hidden');
      document.getElementById('easing-drop')?.classList.add('hidden');
      document.getElementById('bg-custom-drop')?.classList.add('hidden');
      document.getElementById('stroke-mode-drop')?.classList.add('hidden');
    });

    // Spacebar to play/pause
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        e.preventDefault();
        togglePlay();
      }
    });

    // Scroll to zoom
    const canvasContainer = document.getElementById('canvas-container');
    if (canvasContainer) {
      canvasContainer.addEventListener('wheel', (e) => {
        if (e.ctrlKey || e.metaKey) return; // Ignore typical browser zoom
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        let newScale = S.scale + delta;
        newScale = Math.max(0.1, Math.min(3, newScale));
        setScale(newScale);
      });
    }
  }
  if(document.readyState==='complete'||document.readyState==='interactive') init();
  else window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
